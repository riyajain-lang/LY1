<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In and Out Game</title>
<style>
  body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    background: url('assets/game-background.png') no-repeat center center;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  #gameContainer {
    width: 90%;
    max-width: 420px;
    text-align: center;
    background: rgba(255,255,200,0.95);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    position: relative;
  }
  #scoreBoard {
    position: absolute;
    top: 10px;
    right: 15px;
    background: #fff7cc;
    border-radius: 10px;
    padding: 5px 10px;
    font-weight: bold;
  }
  #questionBox {
    background: #fff7cc;
    border-radius: 15px;
    padding: 15px;
    margin: 10px 0;
    font-size: 1.1em;
  }
  .buttonContainer {
    display: flex;
    justify-content: space-around;
    margin: 10px 0;
  }
  button {
    padding: 10px 25px;
    font-size: 1em;
    border-radius: 15px;
    border: 2px solid #333;
    cursor: pointer;
    background: #e0f0f8;
  }
  button:hover {
    background: #c0e0f8;
  }
  #itemImage {
    width: 150px;
    height: 150px;
    object-fit: contain;
    margin-top: 10px;
    border-radius: 15px;
  }
  #logoSlide {
    display: none;
    justify-content: center;
    align-items: center;
    height: 100%;
  }
  #logoSlide img {
    width: 200px;
  }
  #finalSlide {
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  #finalSlide h2 {
    color: #ff3399;
  }
  #playAgainBtn {
    padding: 10px 20px;
    font-size: 1em;
    margin-top: 15px;
    border-radius: 15px;
    border: 2px solid #333;
    cursor: pointer;
    background: #e0f0f8;
  }
  .confetti {
    width: 10px;
    height: 10px;
    position: fixed;
    top: 0;
    background-color: red;
    z-index: 1000;
  }
</style>
</head>
<body>
<div id="logoSlide">
  <img src="assets/innovine-logo.png" alt="Logo">
</div>

<div id="gameContainer">
  <div id="scoreBoard">★ 0/5 ✓ 0</div>
  <div id="questionBox"></div>
  <div class="buttonContainer">
    <button id="inBtn">In</button>
    <button id="outBtn">Out</button>
  </div>
  <img id="itemImage" src="" alt="Item">
</div>

<div id="finalSlide">
  <h2>Good Job!</h2>
  <p>🎉 You completed all questions 🎉</p>
  <button id="playAgainBtn">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const questions = [
  {img:'assets/fruit-in.png', ans:'in', text:'Where is the Fruit?'},
  {img:'assets/lion-in.png', ans:'in', text:'Where is the Lion?'},
  {img:'assets/parrot-out.png', ans:'out', text:'Where is the Parrot?'},
  {img:'assets/cat-out.png', ans:'out', text:'Where is the Cat?'},
  {img:'assets/dog-in.png', ans:'in', text:'Where is the Dog?'}
];

let current = 0, score = 0, attempts = 0;

const logoSlide = document.getElementById('logoSlide');
const gameContainer = document.getElementById('gameContainer');
const finalSlide = document.getElementById('finalSlide');
const questionBox = document.getElementById('questionBox');
const itemImage = document.getElementById('itemImage');
const inBtn = document.getElementById('inBtn');
const outBtn = document.getElementById('outBtn');
const scoreBoard = document.getElementById('scoreBoard');
const correctSound = document.getElementById('correctSound');
const wrongSound = document.getElementById('wrongSound');
const clapSound = document.getElementById('clapSound');
const playAgainBtn = document.getElementById('playAgainBtn');

function showQuestion() {
  if(current >= questions.length){
    gameContainer.style.display = 'none';
    finalSlide.style.display = 'flex';
    launchConfetti();
    clapSound.play();
    return;
  }
  const q = questions[current];
  questionBox.textContent = q.text;
  itemImage.src = q.img;
  attempts = 0;
  scoreBoard.textContent = `★ ${current}/${questions.length} ✓ ${score}`;
}

function checkAnswer(ans) {
  const q = questions[current];
  if(ans === q.ans){
    score++;
    correctSound.play();
    current++;
    showQuestion();
  } else {
    attempts++;
    wrongSound.play();
    if(attempts>=2){
      // auto show correct
      current++;
      showQuestion();
    }
  }
}

inBtn.addEventListener('click', ()=>checkAnswer('in'));
outBtn.addEventListener('click', ()=>checkAnswer('out'));
playAgainBtn.addEventListener('click', ()=>{
  current=0; score=0; attempts=0;
  finalSlide.style.display='none';
  gameContainer.style.display='block';
  showQuestion();
});

function launchConfetti(){
  const colors = ["#ff4fb2","#ffe600","#36a7f0","#4dff4d","#ff8a00"];
  for(let i=0;i<100;i++){
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.style.left = Math.random()*100+'vw';
    confetti.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
    confetti.style.animation = `fall ${Math.random()*2+1}s linear`;
    document.body.appendChild(confetti);
    setTimeout(()=>confetti.remove(),4000);
  }
}

setTimeout(()=>{
  logoSlide.style.display='none';
  showQuestion();
},2000);
</script>

<style>
@keyframes fall {
  0% {top:0;}
  100% {top:100vh;}
}
</style>
</body>
</html>
