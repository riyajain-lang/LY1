<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In and Out</title>
<style>
  body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    background-color: #b0e0f6; /* Light blue */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .game-container {
    background-color: #fffacd; /* Canary yellow */
    padding: 20px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }
  .score {
    float: right;
    background: #ffff99;
    padding: 5px 10px;
    border-radius: 10px;
    margin-top: -10px;
    margin-bottom: 10px;
    font-weight: bold;
  }
  h1 {
    margin: 0 0 10px;
    color: #d63384;
  }
  .question {
    font-size: 1.2em;
    margin-bottom: 20px;
    background: #ffff99;
    padding: 10px;
    border-radius: 10px;
  }
  .btn-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
  }
  button {
    font-size: 1.2em;
    padding: 15px 25px;
    border: 3px solid #0f52ba; /* Sapphire blue */
    border-radius: 15px;
    cursor: pointer;
    background: #ffff99; /* Canary */
    color: #0f52ba;
    transition: 0.2s;
  }
  button:hover {
    background: #f0e68c;
  }
  img {
    width: 80%;
    max-width: 250px;
    border-radius: 15px;
  }
  .end-slide {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
  }
  .end-slide h2 {
    font-size: 2em;
    color: #0f52ba;
    margin-bottom: 20px;
  }
  .play-again {
    font-size: 1.2em;
    padding: 10px 20px;
    border-radius: 15px;
    border: none;
    background-color: #d63384;
    color: white;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="game-container" id="gameContainer">
  <div class="score" id="score">★ 0/5 ✓ 0</div>
  <h1>In and Out</h1>
  <div class="question" id="question">Where is the Fruit?</div>
  <div class="btn-container">
    <button id="inBtn">In</button>
    <button id="outBtn">Out</button>
  </div>
  <img id="qImg" src="assets/fruit-in.png" alt="question image">
</div>

<div class="game-container end-slide" id="endSlide">
  <h2>Good Job!</h2>
  <button class="play-again" id="playAgain">Play Again</button>
</div>

<script>
  const questions = [
    {img:"assets/fruit-in.png", ans:"In", text:"Where is the Fruit?"},
    {img:"assets/lion-in.png", ans:"In", text:"Where is the Lion?"},
    {img:"assets/parrot-out.png", ans:"Out", text:"Where is the Parrot?"},
    {img:"assets/cat-out.png", ans:"Out", text:"Where is the Cat?"},
    {img:"assets/dog-in.png", ans:"In", text:"Where is the Dog?"}
  ];

  let current = 0;
  let correct = 0;
  let attempts = 0;

  const inBtn = document.getElementById("inBtn");
  const outBtn = document.getElementById("outBtn");
  const question = document.getElementById("question");
  const qImg = document.getElementById("qImg");
  const score = document.getElementById("score");
  const gameContainer = document.getElementById("gameContainer");
  const endSlide = document.getElementById("endSlide");
  const playAgain = document.getElementById("playAgain");

  function loadQuestion() {
    attempts = 0;
    question.textContent = questions[current].text;
    qImg.src = questions[current].img;
    score.textContent = `★ ${current}/5 ✓ ${correct}`;
  }

  function handleAnswer(choice) {
    if(choice === questions[current].ans){
      correct++;
      nextQuestion();
    } else {
      attempts++;
      if(attempts >= 2){
        nextQuestion();
      } else {
        alert("Try Again!");
      }
    }
    score.textContent = `★ ${current}/5 ✓ ${correct}`;
  }

  function nextQuestion() {
    current++;
    if(current < questions.length){
      loadQuestion();
    } else {
      gameContainer.style.display = "none";
      endSlide.style.display = "flex";
    }
  }

  inBtn.addEventListener("click", ()=> handleAnswer("In"));
  outBtn.addEventListener("click", ()=> handleAnswer("Out"));
  playAgain.addEventListener("click", ()=>{
    current = 0;
    correct = 0;
    attempts = 0;
    endSlide.style.display = "none";
    gameContainer.style.display = "block";
    loadQuestion();
  });

  loadQuestion();
</script>

</body>
</html>
