<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In and Out Game</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        font-family: 'Comic Sans MS', cursive, sans-serif;
        background-color: #C2EBF5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    #gameContainer {
        width: 90%;
        max-width: 400px;
        text-align: center;
        position: relative;
    }
    #logoSlide, #gameSlide, #endSlide {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    #logoSlide.active, #gameSlide.active, #endSlide.active {
        display: flex;
    }
    img.logo {
        width: 120px;
        margin-bottom: 20px;
    }
    .questionBox {
        background-color: #FFFF99; /* Canary */
        color: #0F52BA; /* Sapphire */
        padding: 15px;
        border-radius: 12px;
        font-size: 1.2rem;
        margin-bottom: 15px;
    }
    .options {
        display: flex;
        justify-content: space-around;
        margin-bottom: 15px;
    }
    .optionBtn {
        padding: 10px 25px;
        border-radius: 10px;
        border: 2px solid #0F52BA;
        background-color: #FFFF99;
        cursor: pointer;
        font-size: 1.1rem;
        transition: transform 0.1s;
    }
    .optionBtn:hover {
        transform: scale(1.05);
    }
    #questionImg {
        max-width: 100%;
        border-radius: 10px;
        margin-bottom: 20px;
    }
    .scoreBox {
        position: absolute;
        top: 10px;
        right: 10px;
        background-color: #FFFF99;
        padding: 5px 10px;
        border-radius: 10px;
    }
    #endSlide h1 {
        color: #0F52BA;
        font-size: 1.5rem;
    }
    .confetti {
        width: 10px;
        height: 10px;
        position: absolute;
        border-radius: 50%;
        animation: confettiFall 4s linear forwards;
    }
    @keyframes confettiFall {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(600px); opacity: 0; }
    }
</style>
</head>
<body>

<div id="gameContainer">
    <!-- Logo Slide -->
    <div id="logoSlide" class="active">
        <img src="assets/innovine-logo.png" alt="Logo" class="logo">
    </div>

    <!-- Game Slide -->
    <div id="gameSlide">
        <div class="scoreBox" id="scoreBox">★ 0/5 ✓ 0</div>
        <div class="questionBox" id="questionText">Question</div>
        <div class="options">
            <button class="optionBtn" id="inBtn">In</button>
            <button class="optionBtn" id="outBtn">Out</button>
        </div>
        <img src="" id="questionImg" alt="Question Image">
    </div>

    <!-- End Slide -->
    <div id="endSlide">
        <h1>Good Job! 🎉</h1>
        <button class="optionBtn" onclick="restartGame()">Play Again</button>
    </div>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const questions = [
    {img: "assets/fruit-in.png", answer: "in", text: "Where is the Fruit?"},
    {img: "assets/lion-in.png", answer: "in", text: "Where is the Lion?"},
    {img: "assets/parrot-out.png", answer: "out", text: "Where is the Parrot?"},
    {img: "assets/cat-out.png", answer: "out", text: "Where is the Cat?"},
    {img: "assets/dog-in.png", answer: "in", text: "Where is the Dog?"}
];

let currentIndex = 0;
let correctCount = 0;
let attempts = 0;

const logoSlide = document.getElementById("logoSlide");
const gameSlide = document.getElementById("gameSlide");
const endSlide = document.getElementById("endSlide");
const questionText = document.getElementById("questionText");
const questionImg = document.getElementById("questionImg");
const inBtn = document.getElementById("inBtn");
const outBtn = document.getElementById("outBtn");
const scoreBox = document.getElementById("scoreBox");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const clapSound = document.getElementById("clapSound");

// Start game after 2 sec logo
setTimeout(() => {
    logoSlide.classList.remove("active");
    gameSlide.classList.add("active");
    loadQuestion();
}, 2000);

function loadQuestion() {
    const q = questions[currentIndex];
    questionText.textContent = q.text;
    questionImg.src = q.img;
    attempts = 0;
    scoreBox.textContent = `★ ${currentIndex}/${questions.length} ✓ ${correctCount}`;
}

function playSound(sound) {
    sound.currentTime = 0;
    sound.play().catch(e=>{});
}

function launchConfetti() {
    const colors = ["#FF52BA","#0F52BA","#FFFF99","#E23260","#F2678E"];
    for(let i=0;i<100;i++){
        const confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.left = Math.random()*100 + "vw";
        confetti.style.background = colors[Math.floor(Math.random()*colors.length)];
        confetti.style.animationDelay = Math.random()*1.5 + "s";
        document.body.appendChild(confetti);
        setTimeout(()=>{confetti.remove()}, 4000);
    }
}

function checkAnswer(answer) {
    const q = questions[currentIndex];
    if(answer === q.answer){
        correctCount++;
        playSound(correctSound);
        launchConfetti();
        currentIndex++;
        if(currentIndex < questions.length){
            loadQuestion();
        } else {
            endGame();
        }
    } else {
        attempts++;
        playSound(wrongSound);
        if(attempts >= 2){
            alert(`Correct answer is "${q.answer.toUpperCase()}"`);
            currentIndex++;
            if(currentIndex < questions.length){
                loadQuestion();
            } else {
                endGame();
            }
        }
    }
}

inBtn.addEventListener("click", ()=> checkAnswer("in"));
outBtn.addEventListener("click", ()=> checkAnswer("out"));

function endGame() {
    gameSlide.classList.remove("active");
    endSlide.classList.add("active");
    playSound(clapSound);
}

function restartGame() {
    currentIndex = 0;
    correctCount = 0;
    endSlide.classList.remove("active");
    gameSlide.classList.add("active");
    loadQuestion();
}
</script>

</body>
</html>
