<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In and Out Game</title>
<style>
  body {
    margin: 0;
    font-family: 'Comic Sans MS', sans-serif;
    background-color: #B3E5FC;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  #gameContainer {
    width: 90%;
    max-width: 400px;
    background-color: #FFF9C4;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
    position: relative;
  }
  #score {
    position: absolute;
    top: 15px;
    right: 15px;
    background-color: #FFFF99;
    padding: 5px 10px;
    border-radius: 10px;
    font-weight: bold;
  }
  h1 {
    color: #E91E63;
    margin-top: 0;
  }
  #question {
    background-color: #FFFF99;
    padding: 10px;
    border-radius: 10px;
    margin: 15px 0;
    font-size: 18px;
  }
  .btn-container {
    display: flex;
    justify-content: space-around;
    margin-bottom: 15px;
  }
  button {
    font-size: 20px;
    padding: 15px 30px;
    border-radius: 15px;
    border: 2px solid #03A9F4;
    background-color: #FFFF99;
    cursor: pointer;
    min-width: 120px;
  }
  button:hover {
    transform: scale(1.05);
  }
  #image {
    width: 100%;
    max-height: 250px;
    object-fit: contain;
    border-radius: 15px;
    border: 2px solid #03A9F4;
  }
  #confetti {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background-color: #E91E63;
    opacity: 0.8;
    animation: fall 3s linear forwards;
  }
  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(300px) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<div id="gameContainer">
  <div id="score">★ 0/5 ✓ 0</div>
  <h1>In and Out</h1>
  <div id="question">Where is the Fruit?</div>
  <div class="btn-container">
    <button id="btnIn">In</button>
    <button id="btnOut">Out</button>
  </div>
  <img id="image" src="" alt="Question Image">
  <div id="confetti"></div>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const questions = [
  {img: 'assets/fruit-in.png', answer: 'In', text: 'Where is the Fruit?'},
  {img: 'assets/lion-in.png', answer: 'In', text: 'Where is the Lion?'},
  {img: 'assets/parrot-out.png', answer: 'Out', text: 'Where is the Parrot?'},
  {img: 'assets/cat-out.png', answer: 'Out', text: 'Where is the Cat?'},
  {img: 'assets/dog-in.png', answer: 'In', text: 'Where is the Dog?'}
];

let current = 0;
let correctCount = 0;
let attempts = 0;

const image = document.getElementById('image');
const questionDiv = document.getElementById('question');
const scoreDiv = document.getElementById('score');
const btnIn = document.getElementById('btnIn');
const btnOut = document.getElementById('btnOut');
const correctSound = document.getElementById('correctSound');
const wrongSound = document.getElementById('wrongSound');
const clapSound = document.getElementById('clapSound');
const confettiContainer = document.getElementById('confetti');

function loadQuestion() {
  const q = questions[current];
  image.src = q.img;
  questionDiv.textContent = q.text;
  attempts = 0;
  updateScore();
}

function updateScore() {
  scoreDiv.textContent = `★ ${current+1}/${questions.length} ✓ ${correctCount}`;
}

function handleAnswer(ans) {
  const q = questions[current];
  if(ans === q.answer){
    correctCount++;
    playSound(correctSound);
    showConfetti();
    setTimeout(nextQuestion, 1000);
  } else {
    attempts++;
    playSound(wrongSound);
    if(attempts >= 2){
      alert('Correct answer: ' + q.answer);
      nextQuestion();
    }
  }
}

function nextQuestion() {
  current++;
  if(current >= questions.length){
    playSound(clapSound);
    alert('Good job! You completed the game. Play again!');
    current = 0;
    correctCount = 0;
  }
  loadQuestion();
}

function playSound(sound){
  sound.currentTime = 0;
  sound.play().catch(e=>{});
}

function showConfetti(){
  for(let i=0;i<50;i++){
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.style.left = Math.random()*100 + '%';
    confetti.style.backgroundColor = `hsl(${Math.random()*360}, 70%, 50%)`;
    confettiContainer.appendChild(confetti);
    setTimeout(()=>{ confetti.remove(); }, 3000);
  }
}

btnIn.addEventListener('click', ()=>handleAnswer('In'));
btnOut.addEventListener('click', ()=>handleAnswer('Out'));

loadQuestion();
</script>

</body>
</html>
