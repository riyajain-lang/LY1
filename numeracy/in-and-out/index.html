<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In and Out</title>
<style>
body, html {
  margin:0; padding:0;
  font-family:"Comic Sans MS", sans-serif;
  width:100%; height:100%;
  display:flex; justify-content:center; align-items:center;
  background:#a0e5f0;
  overflow:hidden;
}
.container {
  width:95vw; max-width:600px; height:95vh;
  background:url('assets/ee855d1c-48a9-4aa5-85de-6abdea8135d3.png') no-repeat center/cover;
  border-radius:25px; padding:10px; display:flex; flex-direction:column; align-items:center;
}
.header {
  font-size:2rem; color:#ec1593; margin-bottom:10px;
  text-align:center; font-weight:bold;
}
.score { font-size:1.2rem; position:absolute; top:10px; right:10px; background:#eefafa; padding:5px 10px; border-radius:20px; border:2px solid #0d2027; }
.instruction {
  font-size:1.3rem; border:3px solid #0d2027;
  border-radius:18px; background:#fff7cf; padding:6px 12px; margin-bottom:15px;
  text-align:center; width:80%;
}
.board {
  display:flex; flex-direction:column; align-items:center; gap:15px; flex:1;
}
.item {
  width:70%; max-width:300px; height:120px; border:4px solid #0d2027;
  border-radius:15px; background:#eefafa;
  display:flex; justify-content:center; align-items:center;
  cursor:pointer; position:relative; font-size:1.5rem;
}
.item img { max-width:90%; max-height:90%; }
.item.selected { border-color:#ec1593; box-shadow:0 0 12px #ec1593; }
.item.matched { opacity:0.7; pointer-events:none; }
.giggle { animation:giggle .35s }
@keyframes giggle {0%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-4px)}100%{transform:translateX(0)}}
.feedback {
  font-size:1.5rem; font-weight:bold; padding:6px 12px;
  border:3px solid #10b917; border-radius:18px;
  background:white; display:none; color:#10b917; margin-top:10px;
}
.confetti{
  position:absolute; width:10px; height:10px;
  top:0; left:0; animation:fall linear forwards;
}
@keyframes fall{
  0%{transform:translateY(0) rotate(0deg);}
  100%{transform:translateY(100vh) rotate(360deg);}
}
#finalScreen {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:rgba(255,255,255,0.95); z-index:100;
  display:none; flex-direction:column; justify-content:center; align-items:center;
}
#finalScreen h1 { font-size:3rem; color:#ec1593; margin-bottom:20px; }
#finalScreen button {
  padding: 10px 20px; font-size:1.5rem; border:none; border-radius:15px;
  background:#10b917; color:white; cursor:pointer;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">In and Out</div>
  <div class="score">★ <span id="score">0</span>/5 ✓</div>
  <div class="instruction" id="instruction">Tap on the correct answer</div>
  <div class="board" id="board"></div>
  <div class="feedback" id="feedback">✓ Good Job!</div>
</div>

<div id="finalScreen">
  <h1>Good Job!</h1>
  <button onclick="playAgain()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const questions = [
  {img:"assets/fruit-in.png", answer:"in", text:"Where is the Fruit?"},
  {img:"assets/lion-in.png", answer:"in", text:"Where is the Lion?"},
  {img:"assets/parrot-out.png", answer:"out", text:"Where is the Parrot?"},
  {img:"assets/cat-out.png", answer:"out", text:"Where is the Cat?"},
  {img:"assets/dog-in.png", answer:"in", text:"Where is the Dog?"}
];

let score=0, current=0;

const board=document.getElementById("board");
const instruction=document.getElementById("instruction");
const feedback=document.getElementById("feedback");
const scoreBox=document.getElementById("score");
const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");
const clapSound=document.getElementById("clapSound");
const finalScreen=document.getElementById("finalScreen");

function loadQuestion(){
  board.innerHTML="";
  feedback.style.display="none";
  if(current>=questions.length){launchConfetti(); playSound(clapSound); setTimeout(()=>finalScreen.style.display="flex",500); return;}
  const q=questions[current];
  instruction.textContent=q.text;
  
  const imgDiv=document.createElement("div");
  imgDiv.className="item"; imgDiv.style.height="150px";
  imgDiv.innerHTML=`<img src="${q.img}" alt="img">`; board.appendChild(imgDiv);
  
  ["in","out"].forEach(opt=>{
    const div=document.createElement("div");
    div.className="item"; div.textContent=opt;
    div.onclick=()=>checkAnswer(opt); board.appendChild(div);
  });
}

function checkAnswer(opt){
  const q=questions[current];
  if(opt===q.answer){
    score++; scoreBox.textContent=score;
    feedback.style.display="block"; playSound(correctSound);
    setTimeout(()=>{feedback.style.display="none"; current++; loadQuestion();},800);
  }else{
    const divs=[...document.querySelectorAll(".item")].filter(el=>el.textContent===opt)[0];
    divs.classList.add("giggle"); playSound(wrongSound);
    setTimeout(()=>divs.classList.remove("giggle"),350);
  }
}

function launchConfetti(){
  for(let i=0;i<100;i++){
    const confetti=document.createElement("div");
    confetti.className="confetti";
    confetti.style.background=`hsl(${Math.random()*360},70%,50%)`;
    confetti.style.left=Math.random()*100 + "vw";
    confetti.style.animationDuration=(2+Math.random()*2)+"s";
    document.body.appendChild(confetti);
    setTimeout(()=>confetti.remove(),4000);
  }
}

function playSound(sound){sound.currentTime=0; sound.play().catch(()=>{});}
function playAgain(){finalScreen.style.display="none"; score=0; scoreBox.textContent=score; current=0; loadQuestion();}
window.onload=()=>loadQuestion();
</script>
</body>
</html>
