<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In and Out</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');

  body {
    margin: 0;
    font-family: 'Comic Neue', cursive;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #B3E5FC;
    min-height: 100vh;
  }

  #game-container {
    width: 90%;
    max-width: 400px;
    text-align: center;
    position: relative;
  }

  #logo-slide, #game-slide, #end-slide {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 15px;
    padding: 20px;
    box-sizing: border-box;
    background-color: #fff7c2;
  }

  #logo-slide img {
    width: 150px;
    height: auto;
  }

  .question-box {
    background-color: #FFFF99;
    border-radius: 10px;
    padding: 10px 20px;
    margin: 15px 0;
    font-size: 1.1rem;
  }

  .score-box {
    position: absolute;
    top: 10px;
    right: 10px;
    background-color: #FFFF99;
    padding: 5px 10px;
    border-radius: 10px;
    font-weight: bold;
  }

  #answer-buttons {
    display: flex;
    justify-content: space-around;
    margin-bottom: 15px;
  }

  .answer-btn {
    flex: 1;
    margin: 0 5px;
    padding: 10px 0;
    border: 2px solid #2196F3;
    border-radius: 10px;
    background-color: #FFFF99;
    cursor: pointer;
    font-size: 1rem;
    transition: transform 0.2s;
  }

  .answer-btn:hover {
    transform: scale(1.05);
  }

  #question-image {
    max-width: 80%;
    height: auto;
    margin-top: 10px;
    border-radius: 10px;
  }

  #end-slide h2 {
    font-size: 1.5rem;
    margin-bottom: 10px;
  }

  #play-again {
    background-color: #FFC107;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    cursor: pointer;
    font-size: 1rem;
    margin-top: 10px;
  }

  .confetti {
    width: 10px;
    height: 10px;
    position: fixed;
    top: 0;
    opacity: 0.8;
    pointer-events: none;
    animation: fall linear forwards;
  }

  @keyframes fall {
    0% {transform: translateY(0);}
    100% {transform: translateY(100vh);}
  }
</style>
</head>
<body>

<div id="game-container">
  <!-- Logo Slide -->
  <div id="logo-slide">
    <img src="assets/innovine-logo.png" alt="Logo">
  </div>

  <!-- Game Slide -->
  <div id="game-slide">
    <div class="score-box" id="score-box">★ 0/5 ✓ 0</div>
    <div class="question-box" id="question-text">Where is th</div>
    <div id="answer-buttons">
      <button class="answer-btn" id="btn-in">In</button>
      <button class="answer-btn" id="btn-out">Out</button>
    </div>
    <img src="" alt="Question" id="question-image">
  </div>

  <!-- End Slide -->
  <div id="end-slide">
    <h2>Good job!</h2>
    <button id="play-again">Play Again</button>
  </div>
</div>

<audio id="correct-sound" src="assets/correct.mp3"></audio>
<audio id="wrong-sound" src="assets/wrong.mp3"></audio>
<audio id="clap-sound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const logoSlide = document.getElementById("logo-slide");
const gameSlide = document.getElementById("game-slide");
const endSlide = document.getElementById("end-slide");

const questionText = document.getElementById("question-text");
const questionImage = document.getElementById("question-image");
const btnIn = document.getElementById("btn-in");
const btnOut = document.getElementById("btn-out");
const scoreBox = document.getElementById("score-box");
const playAgainBtn = document.getElementById("play-again");

const correctSound = document.getElementById("correct-sound");
const wrongSound = document.getElementById("wrong-sound");
const clapSound = document.getElementById("clap-sound");

const questions = [
  {image:"assets/fruit-in.png", answer:"In"},
  {image:"assets/lion-in.png", answer:"In"},
  {image:"assets/parrot-out.png", answer:"Out"},
  {image:"assets/cat-out.png", answer:"Out"},
  {image:"assets/dog-in.png", answer:"In"}
];

let currentQuestion = 0;
let score = 0;
let attempts = 0;

function showLogo() {
  logoSlide.style.display = "flex";
  setTimeout(() => {
    logoSlide.style.display = "none";
    showQuestion();
  }, 2000);
}

function showQuestion() {
  if(currentQuestion >= questions.length){
    showEnd();
    return;
  }
  gameSlide.style.display = "flex";
  questionImage.src = questions[currentQuestion].image;
  scoreBox.innerHTML = `★ ${currentQuestion}/${questions.length} ✓ ${score}`;
  attempts = 0;
}

function handleAnswer(answer){
  if(answer === questions[currentQuestion].answer){
    correctSound.play();
    score++;
    currentQuestion++;
    setTimeout(showQuestion, 500);
  } else {
    wrongSound.play();
    attempts++;
    if(attempts>=2){
      currentQuestion++;
      setTimeout(showQuestion, 500);
    }
  }
}

function showEnd(){
  gameSlide.style.display = "none";
  endSlide.style.display = "flex";
  clapSound.play();
  launchConfetti();
}

btnIn.addEventListener("click", () => handleAnswer("In"));
btnOut.addEventListener("click", () => handleAnswer("Out"));
playAgainBtn.addEventListener("click", () => {
  score = 0;
  currentQuestion = 0;
  endSlide.style.display = "none";
  showLogo();
});

// Confetti
function launchConfetti(){
  for(let i=0;i<150;i++){
    const confetti = document.createElement("div");
    confetti.className = "confetti";
    confetti.style.backgroundColor = `hsl(${Math.random()*360}, 70%, 50%)`;
    confetti.style.left = Math.random()*100 + "vw";
    confetti.style.animationDuration = 2 + Math.random()*3 + "s";
    confetti.style.width = confetti.style.height = 5 + Math.random()*5 + "px";
    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 4000);
  }
}

// Start
showLogo();
</script>

</body>
</html>
