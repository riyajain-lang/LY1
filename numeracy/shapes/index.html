<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preschool Shapes Game</title>
<link href="https://fonts.googleapis.com/css2?family=Arbutus&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family:'Arbutus', cursive; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }

/* Slides */
.slide { display:none; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%; padding:20px; box-sizing:border-box; }

/* Slide 1: Logo */
#logoSlide { display:flex; justify-content:center; align-items:center; flex-direction:column; background:white; }
#logoSlide img { width:200px; height:auto; }

/* Game slides */
#gameSlide { display:flex; flex-direction:column; align-items:center; justify-content:flex-start; width:100%; height:100%; background:url('assets/5b5a03e3-132c-4969-a7d1-7ceb2ac3bb45.png') no-repeat center center; background-size:cover; }
#instructionsBox { width:90%; max-width:400px; border:3px solid brown; background-color:#fff3e0; padding:15px; text-align:center; font-size:18px; margin-bottom:20px; color:#4b2e2e; border-radius:5px; }
.shapeContainer { position:relative; width:90%; max-width:500px; height:400px; display:flex; flex-wrap:wrap; justify-content:space-around; align-items:center; }
.shapeOption { width:80px; height:80px; cursor:pointer; transition:transform 0.2s; }

/* End slide */
#endSlide { display:flex; flex-direction:column; justify-content:center; align-items:center; width:100%; height:100%; background:url('assets/5b5a03e3-132c-4969-a7d1-7ceb2ac3bb45.png') no-repeat center center; background-size:cover; }
#endSlide h1 { font-size:36px; margin-bottom:20px; }
button { padding:10px 25px; font-size:22px; margin-top:20px; cursor:pointer; }
</style>
</head>
<body>

<!-- Slide 1: Logo -->
<div id="logoSlide" class="slide">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
  <p>Loading...</p>
</div>

<!-- Slides 2–4: Game -->
<div id="gameSlide" class="slide">
  <div id="instructionsBox"></div>
  <div class="shapeContainer" id="shapeContainer"></div>
</div>

<!-- Slide 5: End -->
<div id="endSlide" class="slide">
  <h1>🎉 Well Done! 🎉</h1>
  <button id="playAgain">Play Again</button>
</div>

<!-- Audio -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
// Slides
const slides = { logo: document.getElementById('logoSlide'), game: document.getElementById('gameSlide'), end: document.getElementById('endSlide') };
const shapeContainer = document.getElementById('shapeContainer');
const instructionsBox = document.getElementById('instructionsBox');
const correctSound = document.getElementById('correctSound');
const wrongSound = document.getElementById('wrongSound');
const clapSound = document.getElementById('clapSound');
const playAgainBtn = document.getElementById('playAgain');

let currentQuestion = 0;
let attempts = 0;

// Questions (3 slides)
const questions = [
  { type:'triangle', images:['triangle.png','triangle-1.png','triangle-2.png'] },
  { type:'circle', images:['circle.png','circle-1.png','circle-2.png'] },
  { type:'square', images:['square.png','square-1.png','square-2.png'] }
];

// Shuffle helper
function shuffle(array){ return array.sort(()=>Math.random()-0.5); }

// Create shape element
function createShape(src){ 
  const img=document.createElement('img'); 
  img.src='assets/'+src; 
  img.classList.add('shapeOption'); 
  img.addEventListener('click',()=>checkTap(src)); 
  return img; 
}

// Show question
function showQuestion(){
  attempts=0;
  shapeContainer.innerHTML='';
  const q = questions[currentQuestion];
  instructionsBox.textContent = 'Tap on the '+q.type;
  
  // Scatter 3 correct + 6 other random shapes
  let shapes = [...q.images];
  const otherTypes = ['triangle','circle','square'].filter(t=>t!==q.type);
  for(let i=0;i<6;i++){ shapes.push(otherTypes[i%2]+'.png'); }
  shapes = shuffle(shapes);
  shapes.forEach(s=>shapeContainer.appendChild(createShape(s)));
}

// Check tap
function checkTap(src){
  const q = questions[currentQuestion];
  if(q.images.includes(src)){
    correctSound.play();
    Array.from(shapeContainer.children).forEach(img=>{
      if(q.images.includes(img.src.split('/').pop())) img.style.border='3px solid green';
    });
    setTimeout(nextSlide,800);
  } else {
    attempts++;
    wrongSound.play();
    const img = Array.from(shapeContainer.children).find(i=>i.src.endsWith(src));
    img.style.transform='translateX(5px)';
    setTimeout(()=>img.style.transform='translateX(0)',150);
    if(attempts>=2){
      Array.from(shapeContainer.children).forEach(img=>{
        if(q.images.includes(img.src.split('/').pop())) img.style.border='3px solid green';
      });
    }
  }
}

// Move to next slide
function nextSlide(){
  currentQuestion++;
  if(currentQuestion>=questions.length){
    slides.game.style.display='none';
    slides.end.style.display='flex';
    clapSound.play();
    triggerConfetti();
  } else showQuestion();
}

// Play again
playAgainBtn.addEventListener('click',()=>{
  currentQuestion=0;
  attempts=0;
  slides.end.style.display='none';
  slides.game.style.display='flex';
  showQuestion();
});

// Confetti
function triggerConfetti(){
  const canvas=document.createElement('canvas');
  canvas.style.position='fixed'; canvas.style.top=0; canvas.style.left=0;
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  const confetti=[];
  for(let i=0;i<200;i++) confetti.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*6+4,d:Math.random()*10+5,color:`hsl(${Math.random()*360},100%,50%)`});
  let t=0;
  function draw(){ ctx.clearRect(0,0,canvas.width,canvas.height); confetti.forEach(c=>{ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fillStyle=c.color;ctx.fill();c.y+=1+Math.sin(t)*2;c.x+=Math.sin(t)*0.5;if(c.y>canvas.height)c.y=0;}); t+=0.1; requestAnimationFrame(draw); }
  draw();
  setTimeout(()=>canvas.remove(),5000);
}

// Start logo slide
slides.logo.style.display='flex';
setTimeout(()=>{ slides.logo.style.display='none'; slides.game.style.display='flex'; showQuestion(); },2000);
</script>

</body>
</html>
