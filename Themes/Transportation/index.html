<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Transportation Game</title>
<style>
body {
  font-family: Arial, sans-serif;
  background-color: #fdf6f9;
  text-align: center;
  margin: 0;
}

#logoScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
}

#game { display: none; padding: 20px; }

h1 {
  color: #4a6fa5;
  font-size: 34px;
}

.container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
}

/* LEFT SIDE */
.left {
  width: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.vehicle {
  width: 40%;
  max-width: 350px;
}

#vehicleName {
  font-size: 20px;
  margin-top: 10px;
}

/* RIGHT SIDE */
.right {
  width: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 30px;
}

.dropzone {
  width: 30%;
  min-width: 200px;
  border: 3px dashed #bbb;
  border-radius: 12px;
  padding: 10px;
  background: white;
}

.dropzone img {
  width: 100%;
}

.label {
  margin-top: 6px;
  font-size: 18px;
}

button {
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  background: #6c8cd5;
  color: white;
  font-size: 14px;
}

#stars {
  font-size: 24px;
  color: gold;
  margin: 10px;
}

.hint {
  box-shadow: 0 0 25px 12px rgba(255, 223, 100, 0.8);
}

#endScreen {
  display: none;
  font-size: 36px;
  margin-top: 100px;
  color: #4a6fa5;
}
</style>
</head>
<body>

<div id="logoScreen">
  <img src="assets/innovine-logo.png" width="260">
</div>

<div id="game">
  <h1 id="questionText"></h1>
  <button onclick="speakQuestion()">🔊 Hear Question Again</button>
  <div id="stars"></div>

  <div class="container">
    <div class="left">
      <img id="vehicle" class="vehicle" draggable="true">
      <div id="vehicleName"></div>
    </div>

    <div class="right" id="options"></div>
  </div>
</div>

<div id="endScreen">🎉 You did a great job! 🎉</div>

<audio id="rightSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>
const data = [
  { vehicle: "assets/bus.png", name: "Bus", correct: "Road" },
  { vehicle: "assets/car.png", name: "Car", correct: "Road" },
  { vehicle: "assets/truck.png", name: "Truck", correct: "Road" },
  { vehicle: "assets/bicycle.png", name: "Bicycle", correct: "Road" },
  { vehicle: "assets/airplane.png", name: "Airplane", correct: "Sky" },
  { vehicle: "assets/Helicopter.png", name: "Helicopter", correct: "Sky" },
  { vehicle: "assets/Hotairballoon.png", name: "Hot Air Balloon", correct: "Sky" },
  { vehicle: "assets/boat.png", name: "Boat", correct: "Sea" },
  { vehicle: "assets/Cruises.png", name: "Cruise Ship", correct: "Sea" },
  { vehicle: "assets/Motorcycle.png", name: "Motorcycle", correct: "Road" }
];

const optionsBase = [
  { img: "assets/road.png", label: "Road" },
  { img: "assets/sky.png", label: "Sky" },
  { img: "assets/sea.png", label: "Sea" }
];

let current = 0;
let score = 0;
let wrongAttempts = 0;

function speak(text) {
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

function speakQuestion() {
  speak(`Where does the ${data[current].name} go?`);
}

function updateStars() {
  document.getElementById("stars").innerText = "⭐".repeat(score);
}

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function loadGame() {
  if (current >= data.length) {
    document.getElementById("game").style.display = "none";
    document.getElementById("endScreen").style.display = "block";
    return;
  }

  wrongAttempts = 0;

  const item = data[current];
  document.getElementById("vehicle").src = item.vehicle;
  document.getElementById("vehicleName").innerText = item.name;
  document.getElementById("questionText").innerText = `Where does the ${item.name} go?`;

  speakQuestion();

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  shuffle([...optionsBase]).forEach(opt => {
    const div = document.createElement("div");
    div.className = "dropzone";
    div.dataset.label = opt.label;

    div.innerHTML = `<img src="${opt.img}"><div class='label'>${opt.label}</div>`;

    div.addEventListener("dragover", e => e.preventDefault());
    div.addEventListener("drop", handleDrop);

    optionsDiv.appendChild(div);
  });
}

function handleDrop(e) {
  const selected = e.currentTarget.dataset.label;
  const correct = data[current].correct;

  if (selected === correct) {
    document.getElementById("rightSound").play();
    score++;
    updateStars();
    current++;
    setTimeout(loadGame, 800);
  } else {
    document.getElementById("wrongSound").play();
    wrongAttempts++;

    if (wrongAttempts >= 2) {
      document.querySelectorAll(".dropzone").forEach(zone => {
        if (zone.dataset.label === correct) {
          zone.classList.add("hint");
        }
      });
    }
  }
}

const vehicle = document.getElementById("vehicle");
vehicle.addEventListener("dragstart", e => {
  e.dataTransfer.setData("text/plain", "dragging");
});

window.onload = () => {
  setTimeout(() => {
    document.getElementById("logoScreen").style.display = "none";
    document.getElementById("game").style.display = "block";
    loadGame();
  }, 5000);
};
</script>

</body>
</html>
