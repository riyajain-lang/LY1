<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transportation Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f7fb;
      text-align: center;
      margin: 0;
    }

    #logoScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    #logoScreen img { width: 260px; }

    #game { display: none; padding: 20px; }

    h1 { color: #4a6fa5; }

    .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 30px;
    }

    .left, .right { width: 45%; }

    .vehicle { width: 220px; cursor: grab; }

    .dropzone {
      border: 3px dashed #bbb;
      border-radius: 10px;
      padding: 10px;
      margin: 10px;
      background: #ffffff;
      width: 180px;
      display: inline-block;
    }

    .dropzone img { width: 150px; }

    .label { margin-top: 8px; font-size: 16px; }

    #controls { margin-top: 10px; }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: #6c8cd5;
      color: white;
      cursor: pointer;
    }

    #stars { margin-top: 10px; font-size: 24px; color: #f5b301; }

    .celebrate {
      animation: fade 0.8s ease-in-out;
    }

    @keyframes fade {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div id="logoScreen">
  <img src="assets/innovine-logo.png">
</div>

<div id="game">
  <h1 id="questionText">Match the Transport!</h1>

  <div id="controls">
    <button onclick="speakQuestion()">🔊 Hear Question Again</button>
  </div>

  <div id="stars"></div>

  <div class="container">
    <div class="left">
      <img id="vehicle" class="vehicle" draggable="true">
      <div class="label" id="vehicleName"></div>
    </div>

    <div class="right" id="options"></div>
  </div>
</div>

<audio id="rightSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>
const data = [
  { vehicle: "assets/bus.png", name: "Bus", correct: "Road" },
  { vehicle: "assets/car.png", name: "Car", correct: "Road" },
  { vehicle: "assets/truck.png", name: "Truck", correct: "Road" },
  { vehicle: "assets/bicycle.png", name: "Bicycle", correct: "Road" },
  { vehicle: "assets/airplane.png", name: "Airplane", correct: "Sky" },
  { vehicle: "assets/Helicopter.png", name: "Helicopter", correct: "Sky" },
  { vehicle: "assets/Hotairballoon.png", name: "Hot Air Balloon", correct: "Sky" },
  { vehicle: "assets/boat.png", name: "Boat", correct: "Sea" },
  { vehicle: "assets/Cruises.png", name: "Cruise Ship", correct: "Sea" }
];

const optionsBase = [
  { img: "assets/road.png", label: "Road" },
  { img: "assets/sky.png", label: "Sky" },
  { img: "assets/sea.png", label: "Sea" }
];

let current = 0;
let score = 0;

function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

function speak(text) {
  const utterance = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(utterance);
}

function speakQuestion() {
  const item = data[current];
  speak(`Where does the ${item.name} go?`);
}

function updateStars() {
  document.getElementById("stars").innerText = "⭐".repeat(score);
}

function loadGame() {
  const item = data[current];

  document.getElementById("vehicle").src = item.vehicle;
  document.getElementById("vehicleName").innerText = item.name;

  document.getElementById("questionText").innerText = `Where does the ${item.name} go?`;

  speakQuestion();

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  shuffle([...optionsBase]).forEach(opt => {
    const div = document.createElement("div");
    div.className = "dropzone";
    div.dataset.label = opt.label;

    div.innerHTML = `
      <img src="${opt.img}">
      <div class="label">${opt.label}</div>
    `;

    div.addEventListener("dragover", e => e.preventDefault());
    div.addEventListener("drop", handleDrop);

    optionsDiv.appendChild(div);
  });
}

function handleDrop(e) {
  const selected = e.currentTarget.dataset.label;
  const correct = data[current].correct;

  if (selected === correct) {
    document.getElementById("rightSound").play();

    score++;
    updateStars();

    document.body.classList.add("celebrate");
    setTimeout(() => document.body.classList.remove("celebrate"), 800);

    current = (current + 1) % data.length;
    setTimeout(loadGame, 1000);
  } else {
    document.getElementById("wrongSound").play();
  }
}

const vehicle = document.getElementById("vehicle");
vehicle.addEventListener("dragstart", e => {
  e.dataTransfer.setData("text/plain", "dragging");
});

window.onload = () => {
  setTimeout(() => {
    document.getElementById("logoScreen").style.display = "none";
    document.getElementById("game").style.display = "block";
    loadGame();
  }, 5000);
};
</script>

</body>
</html>
