<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Game</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #ffffff;
  height: 100vh;
  overflow: hidden;
}

#logoScreen, #endScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#game {
  display: none;
  height: 100%;
  box-sizing: border-box;
  padding: 10px;
}

h1 {
  text-align: center;
  color: #4a6fa5;
  font-size: 5vw;
  margin: 5px 0;
}

button {
  display: block;
  margin: auto;
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  background: #6c8cd5;
  color: white;
}

#stars {
  text-align: center;
  font-size: 20px;
}

.container {
  display: flex;
  height: 75%;
}

.left {
  width: 50%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.vehicle {
  width: 70%;
  max-height: 60vh;
  object-fit: contain;
  border: 3px solid #ddd;
  border-radius: 10px;
  background: #fff;
  padding: 10px;
}

.right {
  width: 50%;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  align-items: center;
}

.dropzone {
  width: 70%;
  height: 22vh; /* equal height for all options */
  border: 3px dashed #bbb;
  border-radius: 10px;
  text-align: center;
  padding: 10px;
  background: #fff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  box-sizing: border-box;
}

.dropzone img {
  max-height: 70%;
  max-width: 100%;
  object-fit: contain;
  border-radius: 8px;
  border: 2px solid #eee;
}

.hint {
  box-shadow: 0 0 20px gold;
}

.bounce {
  animation: bounce 0.6s ease;
}

@keyframes bounce {
  0% { transform: scale(1); }
  30% { transform: scale(1.1); }
  60% { transform: scale(0.95); }
  100% { transform: scale(1); }
}

#endScreen {
  display: none;
  font-size: 30px;
}

.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  background: red;
  top: 0;
  animation: fall 3s linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}
</style>
</head>
<body>

<div id="logoScreen">
  <img src="assets/innovine-logo.png" width="200">
</div>

<div id="game">
  <h1 id="questionText"></h1>
  <button onclick="speakQuestion()">🔊 Hear Again</button>
  <div id="stars"></div>

  <div class="container">
    <div class="left">
      <img id="vehicle" class="vehicle" draggable="true">
      <div id="vehicleName"></div>
    </div>

    <div class="right" id="options"></div>
  </div>
</div>

<div id="endScreen">
  🎉 You did a great job! 🎉
  <br><br>
  <button onclick="resetGame()">Play Again</button>
</div>

<audio id="rightSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>
const data = [
  { vehicle: "assets/bus.png", name: "Bus", correct: "Road" },
  { vehicle: "assets/car.png", name: "Car", correct: "Road" },
  { vehicle: "assets/truck.png", name: "Truck", correct: "Road" },
  { vehicle: "assets/bicycle.png", name: "Bicycle", correct: "Road" },
  { vehicle: "assets/airplane.png", name: "Airplane", correct: "Sky" },
  { vehicle: "assets/Helicopter.png", name: "Helicopter", correct: "Sky" },
  { vehicle: "assets/Hotairballoon.png", name: "Hot Air Balloon", correct: "Sky" },
  { vehicle: "assets/boat.png", name: "Boat", correct: "Sea" },
  { vehicle: "assets/Cruises.png", name: "Cruise Ship", correct: "Sea" },
  { vehicle: "assets/Motorcycle.png", name: "Motorcycle", correct: "Road" }
];

const optionsBase = [
  { img: "assets/road.png", label: "Road" },
  { img: "assets/Sky.png", label: "Sky" },
  { img: "assets/sea.png", label: "Sea" }
];

let current = 0;
let score = 0;
let wrongAttempts = 0;

function speak(text) {
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.9;
    u.pitch = 1.1;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }
}

function speakCorrect() {
  speak('Correct! Great job!');
}

function speakWrong() {
  speak('Try again');
}
}

function speakQuestion() {
  speak(`Where does the ${data[current].name} go?`);
}

function updateStars() {
  document.getElementById("stars").innerText = "⭐".repeat(score);
}

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function loadGame() {
  if (current >= data.length) {
    document.getElementById("game").style.display = "none";
    showConfetti();
    document.getElementById("endScreen").style.display = "flex";
    return;
  }

  wrongAttempts = 0;

  const item = data[current];
  vehicle.src = item.vehicle;
  vehicleName.innerText = item.name;
  questionText.innerText = `Where does the ${item.name} go?`;

  speakQuestion();

  options.innerHTML = "";

  shuffle([...optionsBase]).forEach(opt => {
    const div = document.createElement("div");
    div.className = "dropzone";
    div.dataset.label = opt.label;

    div.innerHTML = `<img src="${opt.img}"><div>${opt.label}</div>`;

    div.ondragover = e => e.preventDefault();
    div.ondrop = handleDrop;

    options.appendChild(div);
  });
}

function handleDrop(e) {
  const selected = e.currentTarget.dataset.label;
  const correct = data[current].correct;

  if (selected === correct) {
    rightSound.play();
    speakCorrect();

    // bounce animation
    e.currentTarget.classList.add("bounce");
    setTimeout(() => e.currentTarget.classList.remove("bounce"), 600);

    score++;
    updateStars();
    current++;
    setTimeout(loadGame, 700);
  } else {
    wrongSound.play();
    speakWrong();
    wrongAttempts++;

    if (wrongAttempts >= 2) {
      document.querySelectorAll(".dropzone").forEach(z => {
        if (z.dataset.label === correct) z.classList.add("hint");
      });
    }
  }
} else {
    wrongSound.play();
    wrongAttempts++;

    if (wrongAttempts >= 2) {
      document.querySelectorAll(".dropzone").forEach(z => {
        if (z.dataset.label === correct) z.classList.add("hint");
      });
    }
  }
} else {
    wrongSound.play();
    wrongAttempts++;

    if (wrongAttempts >= 2) {
      document.querySelectorAll(".dropzone").forEach(z => {
        if (z.dataset.label === correct) z.classList.add("hint");
      });
    }
  }
}

function showConfetti() {
  for (let i = 0; i < 40; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = `hsl(${Math.random()*360},70%,60%)`;
    c.style.animationDuration = (2 + Math.random()*2) + "s";
    document.body.appendChild(c);
  }
}

vehicle.ondragstart = e => e.dataTransfer.setData("text", "drag");

function resetGame() {
  current = 0;
  score = 0;
  wrongAttempts = 0;
  document.getElementById("endScreen").style.display = "none";
  document.getElementById("game").style.display = "block";
  updateStars();
  loadGame();
}

window.onload = () => {
  setTimeout(() => {
    logoScreen.style.display = "none";
    game.style.display = "block";
    loadGame();
  }, 5000);
};
</script>

</body>
</html>
