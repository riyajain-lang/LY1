<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Transport Adventure</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #FFDE59;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }

        #game-container {
            background: white;
            width: 95vw;
            max-width: 1000px;
            height: 85vh;
            border-radius: 40px;
            border: 10px solid #FF5757;
            box-shadow: 0 15px 0 #cb3a3a;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        .header { text-align: center; color: #FF5757; }

        .progress-bar {
            width: 100%; height: 20px;
            background: #eee; border-radius: 10px;
            margin-top: 10px; overflow: hidden;
        }
        #progress-fill { height: 100%; width: 10%; background: #7ED957; transition: 0.5s; }

        .game-area {
            display: flex;
            flex: 1;
            justify-content: space-around;
            align-items: center;
        }

        .vehicle-box {
            width: 40%;
            padding: 25px;
            border: 6px dashed #5CE1E6;
            border-radius: 30px;
            text-align: center;
            background: #fdfdfd;
        }

        .vehicle-img {
            width: 100%;
            max-width: 280px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .vehicle-img:active { transform: scale(1.1); }

        .targets-column {
            width: 45%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .target-node {
            background: #f9f9f9;
            border: 4px solid #ddd;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .target-node:hover { border-color: #7ED957; background: #e8f9e0; }

        .target-node img {
            width: 110px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
        }

        .target-node b { font-size: 28px; color: #333; }

        #feedback-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 200px;
            display: none;
            z-index: 100;
        }

        .instruction-btn {
            background: #5CE1E6;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <button class="instruction-btn" onclick="playInstructions()">Hear Instructions 🔊</button>
        <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <div class="game-area" id="play-zone">
        <div class="vehicle-box">
            <img id="main-v" class="vehicle-img" draggable="true" src="" alt="Transport">
            <h2 id="v-label">Loading...</h2>
        </div>

        <div class="targets-column">
            <div class="target-node" onclick="checkAnswer('Sky')" ondragover="event.preventDefault()" ondrop="checkAnswer('Sky')">
                <img src="Github Games/sky.png.jpg" alt="Sky">
                <b>Sky</b>
            </div>
            <div class="target-node" onclick="checkAnswer('Sea')" ondragover="event.preventDefault()" ondrop="checkAnswer('Sea')">
                <img src="Github Games/sea.png.jpg" alt="Sea">
                <b>Sea</b>
            </div>
            <div class="target-node" onclick="checkAnswer('Road')" ondragover="event.preventDefault()" ondrop="checkAnswer('Road')">
                <img src="Github Games/road.png.jpg" alt="Road">
                <b>Road</b>
            </div>
        </div>
    </div>

    <div id="feedback-overlay"></div>
</div>

<script>
    // Data using the Github Games folder path
    const transportData = [
        { name: "Aeroplane", type: "Sky", file: "airplane.png.jpg" },
        { name: "Cruises", type: "Sea", file: "Cruises.png.png" },
        { name: "Motorcycle", type: "Road", file: "Motorcycle.png.png" },
        { name: "Truck", type: "Road", file: "truck.png.png" },
        { name: "Helicopter", type: "Sky", file: "Helicopter.png.png" },
        { name: "Boat", type: "Sea", file: "boat.png.png" },
        { name: "Car", type: "Road", file: "car.png.png" },
        { name: "Bicycle", type: "Road", file: "bicycle.png.png" },
        { name: "Bus", type: "Road", file: "bus.png.png" },
        { name: "Hot Air Balloon", type: "Sky", file: "Hotairballoon.png.png" }
    ];

    let currentQ = 0;
    const vImg = document.getElementById('main-v');
    const vName = document.getElementById('v-label');
    const overlay = document.getElementById('feedback-overlay');
    const progress = document.getElementById('progress-fill');

    function speak(txt) {
        const utter = new SpeechSynthesisUtterance(txt);
        utter.rate = 0.85; // Slightly slower for kids
        window.speechSynthesis.speak(utter);
    }

    function playInstructions() {
        speak("Click the transport on the left, then click where it belongs on the right!");
    }

    function initGame() {
        if (currentQ >= transportData.length) {
            document.getElementById('play-zone').innerHTML = "<h1 style='text-align:center; color:#7ED957'>🎉 HURRAY! 🎉<br>You matched them all!</h1>";
            speak("Hooray! You finished the game! Great job!");
            return;
        }

        const data = transportData[currentQ];
        vImg.src = "Github Games/" + data.file;
        vName.innerText = data.name;
        progress.style.width = ((currentQ + 1) * 10) + "%";
        
        speak("Where does the " + data.name + " go?");
    }

    // Drag-and-drop support
    vImg.addEventListener('dragstart', (e) => {
        e.dataTransfer.setData('text', transportData[currentQ].type);
    });

    // Main logic for Click AND Drop
    function checkAnswer(choice) {
        const correct = transportData[currentQ].type;

        if (choice === correct) {
            triggerFeedback("👏", "Correct! Well done!", true);
        } else {
            triggerFeedback("❌", "Oops! Try again!", false);
        }
    }

    function triggerFeedback(emoji, msg, isCorrect) {
        overlay.innerHTML = emoji;
        overlay.style.display = 'block';
        overlay.style.color = isCorrect ? "#7ED957" : "#FF5757";
        speak(msg);

        setTimeout(() => {
            overlay.style.display = 'none';
            if (isCorrect) {
                currentQ++;
                initGame();
            }
        }, 1500);
    }

    window.onload = initGame;
</script>

</body>
</html>
