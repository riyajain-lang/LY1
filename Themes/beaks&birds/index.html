<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Birds & Beaks Game</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Baloo 2',cursive;
}

body{
    overflow:hidden;
    width:100%;
    height:100vh;
    background:url('Themes/beaks&birds/assets/birds&beaks-background.png') center center/cover no-repeat;
}

.screen{
    width:100%;
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.active{
    display:flex;
}

/* Logo Screen */

#logoScreen{
    background:#fff;
}

#logoScreen img{
    width:320px;
    max-width:80%;
}

/* Quiz */

.quiz-card{
    width:95%;
    max-width:1100px;
    background:rgba(255,255,255,0.95);
    border-radius:35px;
    padding:20px;
    box-shadow:0 12px 35px rgba(0,0,0,0.25);
    text-align:center;
}

.badge{
    display:inline-block;
    background:#2f80ed;
    color:white;
    padding:10px 35px;
    border-radius:30px;
    font-size:28px;
    margin-bottom:15px;
}

.question{
    font-size:42px;
    color:#6b3e26;
    margin-bottom:25px;
}

.quiz-area{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;
}

.bird-box{
    width:35%;
    background:white;
    border-radius:25px;
    padding:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.bird-box img{
    width:100%;
    max-height:320px;
    object-fit:contain;
}

.options{
    width:60%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.option{
    background:white;
    border-radius:20px;
    padding:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    cursor:pointer;
    transition:.3s;
    position:relative;
}

.option:hover{
    transform:scale(1.05);
}

.option img{
    width:100%;
    height:120px;
    object-fit:contain;
}

.option-name{
    font-size:22px;
}

.correct{
    border:5px solid #39b54a;
    box-shadow:0 0 25px #39b54a;
}

.tick{
    position:absolute;
    right:10px;
    bottom:10px;
    font-size:35px;
}

.progress{
    margin-top:20px;
}

.dot{
    width:18px;
    height:18px;
    border-radius:50%;
    background:#ccc;
    display:inline-block;
    margin:5px;
}

.dot.active{
    background:#39b54a;
}

/* Finish */

.finish-card{
    background:rgba(255,255,255,.95);
    padding:50px;
    border-radius:35px;
    text-align:center;
    box-shadow:0 12px 35px rgba(0,0,0,.25);
    width:90%;
    max-width:700px;
}

.finish-card h1{
    font-size:70px;
    color:#39b54a;
}

.finish-card h2{
    font-size:38px;
    margin-bottom:30px;
}

.playBtn{
    background:#39b54a;
    color:white;
    border:none;
    padding:20px 50px;
    border-radius:50px;
    font-size:34px;
    cursor:pointer;
}

/* Animations */

@keyframes wiggle{
    0%{transform:translateX(0);}
    25%{transform:translateX(-10px);}
    50%{transform:translateX(10px);}
    75%{transform:translateX(-10px);}
    100%{transform:translateX(0);}
}

.wrong{
    animation:wiggle .4s;
}

@keyframes glow{
    0%{box-shadow:0 0 10px yellow;}
    50%{box-shadow:0 0 35px yellow;}
    100%{box-shadow:0 0 10px yellow;}
}

.glow{
    animation:glow 1s infinite;
}

@media(max-width:768px){

    .question{
        font-size:28px;
    }

    .quiz-area{
        flex-direction:column;
    }

    .bird-box{
        width:100%;
    }

    .options{
        width:100%;
        gap:10px;
    }

    .option img{
        height:70px;
    }

    .option-name{
        font-size:18px;
    }

    .finish-card h1{
        font-size:50px;
    }

    .finish-card h2{
        font-size:28px;
    }

    .playBtn{
        font-size:28px;
    }
}
</style>
</head>

<body>

<!-- Logo -->
<div id="logoScreen" class="screen active">
    <img src="Themes/beaks&birds/assets/innovine-logo.png">
</div>

<!-- Quiz -->
<div id="quizScreen" class="screen">

    <div class="quiz-card">

        <div class="badge" id="badge"></div>

        <div class="question">
            Which beak belongs to this bird?
        </div>

        <div class="quiz-area">

            <div class="bird-box">
                <img id="birdImage">
            </div>

            <div class="options" id="options"></div>

        </div>

        <div class="progress" id="progress"></div>

    </div>

</div>

<!-- Finish -->
<div id="finishScreen" class="screen">

    <div class="finish-card">
        <h1>🎉 Good Job! 🎉</h1>
        <h2>You Did It!</h2>

        <button class="playBtn" onclick="restartGame()">
            🔄 Play Again
        </button>
    </div>

</div>

<audio id="correctSound"
src="Themes/beaks&birds/assets/freesound_community-claps-44774.mp3"></audio>

<audio id="clapSound"
src="Themes/beaks&birds/assets/freesound_community-claps-44774.mp3"></audio>

<audio id="wrongSound"
src="Themes/beaks&birds/assets/wrong.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const questions = [
{
bird:'Themes/beaks&birds/assets/eagle.png',
answer:'Themes/beaks&birds/assets/eagle-beak.png'
},
{
bird:'Themes/beaks&birds/assets/toucan.png',
answer:'Themes/beaks&birds/assets/toucan-beak.png'
},
{
bird:'Themes/beaks&birds/assets/parrot.png',
answer:'Themes/beaks&birds/assets/parrots-beak.png'
},
{
bird:'Themes/beaks&birds/assets/owl.png',
answer:'Themes/beaks&birds/assets/owl-beak.png'
}
];

const beaks = [
'Themes/beaks&birds/assets/toucan-beak.png',
'Themes/beaks&birds/assets/owl-beak.png',
'Themes/beaks&birds/assets/parrots-beak.png',
'Themes/beaks&birds/assets/eagle-beak.png'
];

let current = 0;
let wrongAttempts = 0;
let gameQuestions = [];

const birdImage = document.getElementById('birdImage');
const optionsDiv = document.getElementById('options');

function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>{
        s.classList.remove('active');
    });

    document.getElementById(id).classList.add('active');
}

setTimeout(()=>{
    startGame();
},2000);

function shuffle(arr){
    return [...arr].sort(()=>Math.random()-0.5);
}

function startGame(){
    gameQuestions = shuffle(questions);
    current = 0;
    showScreen('quizScreen');
    loadQuestion();
}

function loadQuestion(){

    wrongAttempts = 0;

    let q = gameQuestions[current];

    document.getElementById('badge').innerHTML =
        `Question ${current+1} of ${gameQuestions.length}`;

    birdImage.src = q.bird;

    optionsDiv.innerHTML = '';

    let shuffled = shuffle(beaks);

    shuffled.forEach(beak=>{

        let div = document.createElement('div');
        div.className = 'option';

        let label = beak
            .split('/').pop()
            .replace('.png','')
            .replace('-',' ')
            .replace('toucan','Toucan')
            .replace('owl','Owl')
            .replace('eagle','Eagle')
            .replace('parrots','Parrot');

        div.innerHTML = `
            <img src="${beak}">
            <div class="option-name">${label}</div>
        `;

        div.onclick = ()=>checkAnswer(div,beak);

        optionsDiv.appendChild(div);
    });

    drawProgress();
}

function checkAnswer(card,beak){

    let q = gameQuestions[current];

    if(beak === q.answer){

        document.getElementById('correctSound').play();
        document.getElementById('clapSound').play();

        card.classList.add('correct');
        card.innerHTML += `<div class="tick">✅</div>`;

        setTimeout(()=>{

            current++;

            if(current >= gameQuestions.length){
                finishGame();
            }
            else{
                loadQuestion();
            }

        },1200);

    }
    else{

        document.getElementById('wrongSound').play();

        card.classList.add('wrong');

        setTimeout(()=>{
            card.classList.remove('wrong');
        },400);

        wrongAttempts++;

        if(wrongAttempts >= 2){

            document.querySelectorAll('.option')
            .forEach(o=>{

                let img = o.querySelector('img').src;

                if(img.includes(q.answer)){
                    o.classList.add('glow');
                }

            });

        }
    }
}

function drawProgress(){

    let html = '';

    for(let i=0;i<gameQuestions.length;i++){
        html += `
            <span class="dot ${i===current?'active':''}">
            </span>
        `;
    }

    document.getElementById('progress').innerHTML = html;
}

function finishGame(){

    showScreen('finishScreen');

    confetti({
        particleCount:250,
        spread:180,
        origin:{y:0.6}
    });
}

function restartGame(){

    gameQuestions = shuffle(questions);
    current = 0;

    showScreen('quizScreen');
    loadQuestion();
}

</script>

</body>
</html>
