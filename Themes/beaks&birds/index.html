<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birds & Beaks Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
overflow:hidden;
}

.screen{
display:none;
width:100vw;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{display:flex;}

/* BACKGROUND FIX */
#gameScreen{
background:url("LY1/Themes/beaks&birds/assets/birds&beaks-background.png") no-repeat center center;
background-size:cover;
}

/* LOGO */
#logoScreen{
background:white;
}

#logoScreen img{
width:220px;
}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:20px;
width:90%;
max-width:420px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
text-align:center;
}

/* OPTIONS */
.options{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.option{
background:#eef7ff;
padding:10px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

.option img{
width:90px;
height:90px;
object-fit:contain;
}

.option:active{
transform:scale(0.95);
}

.correct{
border:3px solid green;
}

.wrongShake{
animation:shake 0.3s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
font-size:16px;
margin-top:10px;
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="correctSound" src="LY1/Themes/beaks&birds/assets/correct.mp3"></audio>
<audio id="wrongSound" src="LY1/Themes/beaks&birds/assets/wrong.mp3"></audio>
<audio id="clapSound" src="LY1/Themes/beaks&birds/assets/freesound_community-claps-44774.mp3"></audio>

<!-- SCREEN 1 -->
<div id="logoScreen" class="screen active">
<img src="LY1/Themes/beaks&birds/assets/innovine-logo.png">
</div>

<!-- SCREEN 2 GAME -->
<div id="gameScreen" class="screen active">

<div class="card">
<img id="birdImg" width="120">
<h2 id="question"></h2>

<div class="options" id="options"></div>

</div>
</div>

<!-- SCREEN 3 END -->
<div id="endScreen" class="screen">
<h1>🎉 Good Job!</h1>
<button onclick="restartGame()">Play Again</button>
</div>

<script>

let questions = [
{
bird:"eagle.png",
q:"Find Eagle Beak",
ans:"eagle-beak.png",
options:["toucan-beak.png","owl-beak.png","parrots-beak.png","eagle-beak.png"]
},
{
bird:"toucan.png",
q:"Find Toucan Beak",
ans:"toucan-beak.png",
options:["toucan-beak.png","owl-beak.png","parrots-beak.png","eagle-beak.png"]
},
{
bird:"parrot.png",
q:"Find Parrot Beak",
ans:"parrots-beak.png",
options:["toucan-beak.png","owl-beak.png","parrots-beak.png","eagle-beak.png"]
},
{
bird:"owl.png",
q:"Find Owl Beak",
ans:"owl-beak.png",
options:["toucan-beak.png","owl-beak.png","parrots-beak.png","eagle-beak.png"]
}
];

let current=0;
let attempts=0;

let correctSound=document.getElementById("correctSound");
let wrongSound=document.getElementById("wrongSound");
let clapSound=document.getElementById("clapSound");

let logo=document.getElementById("logoScreen");
let game=document.getElementById("gameScreen");
let end=document.getElementById("endScreen");

setTimeout(()=>{
logo.classList.remove("active");
},2000);

function loadQ(){

attempts=0;

let q=questions[current];

document.getElementById("birdImg").src=
"LY1/Themes/beaks&birds/assets/"+q.bird;

document.getElementById("question").innerText=q.q;

let box=document.getElementById("options");
box.innerHTML="";

let shuffled=q.options.sort(()=>Math.random()-0.5);

shuffled.forEach(o=>{
let div=document.createElement("div");
div.className="option";
div.innerHTML=`<img src="LY1/Themes/beaks&birds/assets/${o}">`;

div.onclick=()=>check(div,o,q.ans);

box.appendChild(div);
});

}

function check(el,opt,ans){

if(opt===ans){
correctSound.play();
el.classList.add("correct");

setTimeout(next,800);

}else{
wrongSound.play();
attempts++;
el.classList.add("wrongShake");

if(attempts>=2){
document.querySelectorAll(".option").forEach(o=>{
if(o.innerHTML.includes(ans)){
o.classList.add("correct");
}
});
setTimeout(next,1000);
}
}
}

function next(){
current++;
if(current<questions.length){
loadQ();
}else{
game.style.display="none";
end.classList.add("active");
clapSound.play();
}
}

function restartGame(){
location.reload();
}

loadQ();

</script>

</body>
</html>
