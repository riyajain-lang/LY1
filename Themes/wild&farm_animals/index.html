<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm & Wild Animals Tap Game</title>
<style>
body, html {
  margin:0; padding:0; font-family:Arial; height:100vh; 
  background:linear-gradient(to bottom,#d4f7d4,#a8e6a8); overflow:hidden;
}
#splash,#game,#endScreen {
  width:100%; height:100%; position:absolute; top:0; left:0;
  display:flex; justify-content:center; align-items:center; flex-direction:column;
}
#splash { background:white; z-index:10; }
#game { display:none; flex-direction:column; z-index:5; padding:10px; box-sizing:border-box; }
#instructions {
  font-size:22px; text-align:center; padding:10px;
  border:3px solid #5c4033; border-radius:12px;
  background:rgba(255,255,255,0.8); margin-bottom:10px; font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}
#zones {
  display:flex; flex:2; justify-content:space-between;
  margin-bottom:10px; height:40%; width:100%;
}
.zone {
  width:55%; height:100%; border:3px solid #5c4033; border-radius:20px;
  background-size:cover; background-position:center; display:flex;
  flex-direction:row; flex-wrap:wrap; justify-content:flex-start; align-items:flex-start;
  box-shadow:0 6px 15px rgba(0,0,0,0.3); overflow:auto;
}
.zone h3 {
  width:100%; text-align:center; margin:0; padding:8px; 
  background:rgba(255,255,255,0.8); border-radius:10px; font-weight:bold; font-size:18px;
}
#tray {
  display:flex; flex-wrap:wrap; justify-content:center; flex:1;
  padding:10px; background:rgba(255,255,255,0.3); border-radius:20px;
  box-shadow:0 4px 15px rgba(0,0,0,0.2); overflow:hidden; height:40%;
}
#tray img {
  width:60px; height:60px; margin:5px; cursor:pointer;
  border-radius:12px; border:2px solid #fff; box-shadow:0 4px 8px rgba(0,0,0,0.3);
  transition:transform 0.2s;
}
#tray img:hover { transform:scale(1.1) rotate(-3deg); }
#feedback {
  position:absolute; top:15px; left:50%; transform:translateX(-50%);
  font-size:32px; font-weight:bold; color:green; text-shadow:2px 2px 4px #000; display:none;
}
#scoreboard {
  position:absolute; top:15px; right:15px; font-size:20px; font-weight:bold;
  color:#000; background:rgba(255,255,255,0.7); padding:5px 10px;
  border-radius:8px; box-shadow:0 3px 8px rgba(0,0,0,0.2);
}
#endScreen {
  display:none; position:absolute; top:0; left:0; width:100%; height:100%;
  z-index:20; background:rgba(0,0,0,0.7); flex-direction:column;
  justify-content:center; align-items:center; text-align:center; color:white; font-size:34px;
}
#endScreen button {
  margin-top:25px; padding:15px 30px; font-size:22px; border:none;
  border-radius:12px; cursor:pointer; background:#f9a825; color:#000; font-weight:bold;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
.zone img { max-width:60px; max-height:60px; object-fit:contain; margin:5px; }
.shake { animation: shake 0.3s; }
@keyframes shake { 0% { transform: translateX(0);} 25% { transform: translateX(-5px);}
  50% { transform: translateX(5px);} 75% { transform: translateX(-5px);} 100% { transform: translateX(0);} }
</style>
</head>
<body>

<div id="splash">
  <img src="assets/innovine-logo.png" alt="Logo" style="width:220px;">
</div>

<div id="game">
  <div id="instructions">Tap an animal, then tap the correct zone: Jungle for Wild, Farm for Farm.</div>
  <div id="zones">
    <div id="forest" class="zone" style="background-image:url('assets/jungle.png');"><h3>Wild Animals</h3></div>
    <div id="farm" class="zone" style="background-image:url('assets/farm.png');"><h3>Farm Animals</h3></div>
  </div>
  <div id="tray"></div>
  <div id="feedback"></div>
  <div id="scoreboard">Question: 1 / 15</div>
</div>

<div id="endScreen">
  <div>🎉 Good Job! 🎉</div>
  <button onclick="restartGame()">Play Again</button>
</div>

<audio id="correct-sound" src="assets/correct.mp3"></audio>
<audio id="wrong-sound" src="assets/wrong.mp3"></audio>
<audio id="clap-sound" src="assets/freesound_community-claps-44774.mp3"></audio>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const splash=document.getElementById('splash');
const game=document.getElementById('game');
const forest=document.getElementById('forest');
const farm=document.getElementById('farm');
const tray=document.getElementById('tray');
const feedback=document.getElementById('feedback');
const scoreboard=document.getElementById('scoreboard');
const endScreen=document.getElementById('endScreen');

const correctSound=document.getElementById('correct-sound');
const wrongSound=document.getElementById('wrong-sound');
const clapSound=document.getElementById('clap-sound');

const wildAnimals=['lion.png','tiger.png','zebra.png','giraffe.png','monkey.png'];
const farmAnimals=['pig.png','horse.png','hen.png','chick.jpeg','cock.png'];

let questions=[], currentQ=0;
let selectedAnimal=null;

function generateQuestions(){
  for(let i=0;i<15;i++){
    questions.push({wild:[...wildAnimals].sort(()=>Math.random()-0.5),
                    farm:[...farmAnimals].sort(()=>Math.random()-0.5)});
  }
}

function loadQuestion(index){
  tray.innerHTML='';
  const q=questions[index];
  const allAnimals=[...q.wild,...q.farm].sort(()=>Math.random()-0.5);
  allAnimals.forEach(animal=>{
    const img=document.createElement('img');
    img.src='assets/'+animal;
    img.dataset.correct=q.wild.includes(animal)?'wild':'farm';
    img.addEventListener('click',()=> selectedAnimal=img);
    tray.appendChild(img);
  });
  scoreboard.textContent=`Question: ${currentQ+1} / 15`;
}

// Tap events
forest.addEventListener('click',()=> placeAnimal('wild'));
farm.addEventListener('click',()=> placeAnimal('farm'));

function placeAnimal(zone){
  if(!selectedAnimal) return;
  const targetContainer = zone==='wild'?forest:farm;

  if(selectedAnimal.dataset.correct===zone){
    correctSound.play();
    feedback.textContent='Good Job!';
    feedback.style.display='block';
    setTimeout(()=>feedback.style.display='none',800);

    // Place horizontally in zone
    const imgClone = selectedAnimal.cloneNode(true);
    imgClone.style.width='60px';
    imgClone.style.height='60px';
    imgClone.style.objectFit='contain';
    targetContainer.appendChild(imgClone);

    selectedAnimal.remove();
    selectedAnimal=null;

    if(tray.querySelectorAll('img').length===0){
      showEndScreen(); // show last slide instead of restarting
    }
  } else {
    wrongSound.play();
    selectedAnimal.classList.add('shake');
    setTimeout(()=> selectedAnimal.classList.remove('shake'),300);
    selectedAnimal=null;
  }
}

function showEndScreen(){
  clapSound.play();
  confetti({particleCount:200, spread:80, origin:{y:0.6}});
  game.style.display='none';
  endScreen.style.display='flex';
}

function restartGame(){
  endScreen.style.display='none';

  // Clear zones
  forest.querySelectorAll('img').forEach(img => img.remove());
  farm.querySelectorAll('img').forEach(img => img.remove());

  // Reset variables
  currentQ = 0;
  selectedAnimal = null;
  questions = [];

  // Generate questions and load first
  generateQuestions();
  loadQuestion(0);

  // Show game screen
  game.style.display = 'flex';
}

// Splash screen 2s
setTimeout(()=>{
  splash.style.display='none';
  game.style.display='flex';
  generateQuestions();
  loadQuestion(0);
},2000);
</script>
</body>
</html>
