<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birds & Beaks</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f7fb;
overflow:hidden;
}

/* SCREEN */
.screen{
display:none;
width:100vw;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{display:flex;}

/* GRID HOME */
.home{
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr 1fr;
gap:15px;
width:95%;
height:95%;
}

/* TILE */
.tile{
background:white;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
padding:10px;
overflow:hidden;
}

/* LOGO */
.logo img{
width:180px;
}

/* VIDEO */
.video video{
width:100%;
border-radius:15px;
}

/* QUESTION AREA */
.questionBox{
grid-column:span 2;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:10px;
}

.birdImg{
width:120px;
height:120px;
object-fit:contain;
}

.options{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
width:100%;
}

.option{
background:#eef4ff;
padding:10px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
text-align:center;
font-size:14px;
}

.option img{
width:70px;
height:70px;
object-fit:contain;
}

.option:active{
transform:scale(0.95);
}

.correct{
border:3px solid #2ecc71;
background:#eaffea;
}

.glow{
animation:glow 1s infinite;
}

@keyframes glow{
0%{box-shadow:0 0 10px yellow;}
50%{box-shadow:0 0 25px yellow;}
100%{box-shadow:0 0 10px yellow;}
}

.wrong{
animation:shake 0.3s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

/* END */
.end{
background:url("LY1/Themes/birds_and_beaks/assets/birds&beaks-background.png") center/cover;
}

.endCard{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

button{
margin-top:10px;
padding:12px 25px;
border:none;
border-radius:20px;
background:#2ecc71;
color:white;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- HOME SCREEN -->
<div id="home" class="screen active">
<div class="home">

<div class="tile logo">
<img src="LY1/Themes/birds_and_beaks/assets/innovine-logo.png">
</div>

<div class="tile video">
<video autoplay muted loop>
<source src="LY1/Themes/birds_and_beaks/assets/beaks&birds-video.mp4">
</video>
</div>

<div class="tile questionBox">
<h2 id="qText">Question</h2>
<img id="bird" class="birdImg">

<div class="options" id="options"></div>
</div>

</div>
</div>

<!-- END -->
<div id="end" class="screen end">
<div class="endCard">
<h1>🎉 Good Job!</h1>
<button onclick="restart()">Play Again</button>
</div>
</div>

<audio id="correct" src="LY1/Themes/birds_and_beaks/assets/freesound_community-claps-44774.mp3"></audio>
<audio id="wrong" src="LY1/Themes/birds_and_beaks/assets/wrong.mp3"></audio>

<script>

const data=[
{
bird:"eagle.png",
ans:"eagle-beak.png"
},
{
bird:"toucan.png",
ans:"toucan-beak.png"
},
{
bird:"parrot.png",
ans:"parrots-beak.png"
},
{
bird:"owl.png",
ans:"owl-beak.png"
}
];

const beaks=[
"eagle-beak.png",
"toucan-beak.png",
"parrots-beak.png",
"owl-beak.png"
];

let i=0;
let wrongCount=0;

function load(){

wrongCount=0;

document.getElementById("bird").src =
"LY1/Themes/birds_and_beaks/assets/"+data[i].bird;

document.getElementById("qText").innerText =
"Find the correct beak";

let opt=document.getElementById("options");
opt.innerHTML="";

beaks.sort(()=>Math.random()-0.5).forEach(b=>{

let div=document.createElement("div");
div.className="option";

div.innerHTML=`
<img src="LY1/Themes/birds_and_beaks/assets/${b}">
<div>${b.replace('.png','')}</div>
`;

div.onclick=()=>check(div,b,data[i].ans);

opt.appendChild(div);

});

}

function check(el,val,ans){

if(val===ans){
document.getElementById("correct").play();
el.classList.add("correct");

setTimeout(()=>{
i++;
if(i<data.length){
load();
}else{
document.getElementById("home").classList.remove("active");
document.getElementById("end").classList.add("active");
}
},800);

}else{

document.getElementById("wrong").play();
el.classList.add("wrong");

setTimeout(()=>el.classList.remove("wrong"),300);

wrongCount++;

if(wrongCount>=2){
document.querySelectorAll(".option").forEach(o=>{
if(o.innerHTML.includes(ans)){
o.classList.add("glow");
}
});
}

}

}

function restart(){
location.reload();
}

load();

</script>

</body>
</html>
