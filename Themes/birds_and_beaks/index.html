<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Birds & Beaks Game</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Baloo 2', cursive;
}

body{
overflow:hidden;
width:100%;
height:100vh;
background:url('LY1/Themes/birds_and_beaks/assets/birds-and-beaks-background.png') center/cover no-repeat;
}

.screen{
width:100%;
height:100vh;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{display:flex;}

/* LOGO */
#logoScreen{
background:#fff;
}

#logoScreen img{
width:300px;
max-width:80%;
}

/* GAME CARD */
.quiz-card{
width:90%;
max-width:900px;
background:rgba(255,255,255,0.95);
border-radius:25px;
padding:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.question{
font-size:32px;
margin-bottom:20px;
color:#333;
}

.options{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.option{
background:white;
padding:10px;
border-radius:15px;
cursor:pointer;
transition:0.2s;
}

.option img{
width:100px;
height:100px;
object-fit:contain;
}

.option:active{
transform:scale(0.95);
}

.correct{
border:3px solid #2ecc71;
box-shadow:0 0 15px #2ecc71;
}

.wrongShake{
animation:shake 0.3s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

/* END */
button{
padding:12px 25px;
border:none;
background:#2ecc71;
color:white;
border-radius:10px;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGO -->
<div id="logoScreen" class="screen active">
<img src="LY1/Themes/birds_and_beaks/assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">

<div class="quiz-card">
<h2 id="question">Find the correct beak</h2>

<div class="options" id="options"></div>
</div>

</div>

<!-- END -->
<div id="endScreen" class="screen">
<h1>🎉 Good Job!</h1>
<button onclick="restart()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="LY1/Themes/birds_and_beaks/assets/freesound_community-claps-44774.mp3"></audio>
<audio id="wrongSound" src="LY1/Themes/birds_and_beaks/assets/wrong.mp3"></audio>

<script>

const questions=[
{
bird:"eagle.png",
ans:"eagle-beak.png"
},
{
bird:"toucan.png",
ans:"toucan-beak.png"
},
{
bird:"parrot.png",
ans:"parrots-beak.png"
},
{
bird:"owl.png",
ans:"owl-beak.png"
}
];

const options=[
"eagle-beak.png",
"toucan-beak.png",
"parrots-beak.png",
"owl-beak.png"
];

let current=0;
let attempts=0;

setTimeout(()=>{
document.getElementById("logoScreen").classList.remove("active");
document.getElementById("gameScreen").classList.add("active");
load();
},2000);

function load(){

attempts=0;

let q=questions[current];

document.getElementById("options").innerHTML="";

shuffle(options).forEach(opt=>{

let div=document.createElement("div");
div.className="option";

div.innerHTML=`
<img src="LY1/Themes/birds_and_beaks/assets/${opt}">
<p>${opt.replace('.png','')}</p>
`;

div.onclick=()=>check(div,opt,q.ans);

document.getElementById("options").appendChild(div);

});

}

function check(el,opt,ans){

if(opt===ans){

document.getElementById("correctSound").play();
el.classList.add("correct");

setTimeout(()=>{
current++;
if(current<questions.length){
load();
}else{
document.getElementById("gameScreen").classList.remove("active");
document.getElementById("endScreen").classList.add("active");
}
},800);

}else{

document.getElementById("wrongSound").play();
el.classList.add("wrongShake");

setTimeout(()=>el.classList.remove("wrongShake"),300);
}

}

function shuffle(arr){
return [...arr].sort(()=>Math.random()-0.5);
}

function restart(){
location.reload();
}

</script>

</body>
</html>
