<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Farmers Market Sorting Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{overflow:hidden;background:#fff}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
#splash img{width:220px;max-width:70%;}

/* GAME */
#game{
  display:none;
  height:100vh;
  flex-direction:column;
}

/* INSTRUCTION */
#instruction{
  background:#cde7c4;
  text-align:center;
  font-weight:bold;
  font-size:22px;
  padding:10px;
}

/* ZONES */
.middle{
  flex:1;
  display:flex;
  justify-content:space-between;
  padding:10px;
  gap:10px;
}

.zone{
  flex:1;
  border-radius:20px;
  position:relative;
  border:4px solid #ffb347;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  font-weight:bold;
  font-size:20px;
}

.fruitZone{
  background:url("assets/fruits-zone-background.png") center/cover;
}

.vegZone{
  background:url("assets/vegetable-zone-background.png") center/cover;
  border-color:#7ccf7a;
}

/* ZONE GLOW (TEACHING HINT) */
.glow{
  box-shadow:0 0 22px 7px rgba(255, 230, 0, 0.95);
}

/* OPTIONS */
.bottom{
  height:38%;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-content:flex-start;
  gap:10px;
}

.card{
  width:86px;
  height:86px;
  border:2px solid #ffd4a3;
  border-radius:14px;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.card img{
  width:92%;
  height:92%;
  object-fit:contain;
}

.selected{
  outline:3px solid #2f80ed;
  transform:scale(1.05);
}

/* END */
#end{
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:white;
  font-size:18px;
}

/* CONFETTI */
.confetti{
  position:fixed;
  width:10px;
  height:10px;
  top:-10px;
  z-index:9999;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game">

  <div id="instruction">Tap a fruit or vegetable, then tap zone</div>

  <div class="middle">

    <div id="fruitZone" class="zone fruitZone">🍎 Fruits</div>
    <div id="vegZone" class="zone vegZone">🥕 Vegetables</div>

  </div>

  <div class="bottom" id="board"></div>

</div>

<!-- END -->
<div id="end">
  <h1>🎉 Good Job!</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

let items=[];
for(let i=1;i<=10;i++) items.push({img:`assets/fruit-${i}.png`,type:"fruit"});
for(let i=1;i<=10;i++) items.push({img:`assets/vegetable-${i}.png`,type:"veg"});

let selected=null;
let score=0;
let wrong={};

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="flex";
  load();
},2000);

function load(){
  const board=document.getElementById("board");
  board.innerHTML="";

  items.sort(()=>Math.random()-0.5);

  items.forEach((it,i)=>{
    const div=document.createElement("div");
    div.className="card";
    div.dataset.type=it.type;
    div.dataset.id=i;

    div.innerHTML=`<img src="${it.img}">`;

    div.onclick=()=>{
      document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
      selected=div;
      div.classList.add("selected");
    };

    board.appendChild(div);
  });
}

/* SOUND */
function play(id){
  const s=document.getElementById(id);
  s.currentTime=0;
  s.play();
}

/* CONFETTI */
function confetti(){
  for(let i=0;i<120;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=["#ffb347","#7ccf7a","#ff6b6b","#4dabf7","#ffd93d"][i%5];
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}

/* GLOW HELPER */
function glow(zone){
  zone.classList.add("glow");
  setTimeout(()=>zone.classList.remove("glow"),1200);
}

/* ZONES */
fruitZone.onclick=()=>check("fruit");
vegZone.onclick=()=>check("veg");

function check(zone){
  if(!selected) return;

  let id=selected.dataset.id;
  wrong[id]=wrong[id]||0;

  let correct = selected.dataset.type === zone;

  if(correct){

    play("correct");
    play("clap");

    selected.style.opacity="0.4";
    selected.onclick=null;
    selected=null;
    score++;

    if(score===20){
      setTimeout(()=>{
        confetti();
        document.getElementById("end").style.display="flex";
      },500);
    }

  }else{

    play("wrong");
    wrong[id]++;

    selected.style.transform="translateX(-6px)";
    setTimeout(()=>selected.style.transform="translateX(6px)",100);

    // 💡 MENTAL LEARNING FEATURE (NEW)
    if(selected.dataset.type==="fruit"){
      glow(fruitZone);
    }else{
      glow(vegZone);
    }
  }
}

</script>

</body>
</html>
