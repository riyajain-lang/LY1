<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Farmers Market Sorting Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;}

body{background:#fff;}

/* SPLASH */
#logoScreen{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
#logoScreen img{width:220px;max-width:70%;}

/* GAME */
#gameScreen{display:none;width:100%;height:100%;}

.game{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
}

/* ✅ FIXED VERTICAL ZONES */
.zones{
  flex:1;
  display:flex;
  flex-direction:column;   /* IMPORTANT FIX */
  gap:10px;
  padding:10px;
}

.zone{
  flex:1;
  border-radius:15px;
  border:3px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:18px;
  position:relative;
}

/* BACKGROUNDS */
.zone-fruits{
  background:url("./LY1/Themes/farmers-market/assets/fruits-zone-background.png") center/cover;
  border-color:#ffb347;
}

.zone-veg{
  background:url("./LY1/Themes/farmers-market/assets/vegetable-zone-background.png") center/cover;
  border-color:#7ccf7a;
}

/* BOTTOM OPTIONS */
.options{
  height:30%;
  background:#fff3e6;
  border-top:3px solid #ffb347;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:8px;
  padding:6px;
}

.item{
  width:60px;
  height:60px;
  border-radius:10px;
  border:2px solid #ccc;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  overflow:hidden;
}

.item img{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* SELECT */
.selected{outline:3px solid #0077ff; transform:scale(1.05);}
.glow{animation: glow 0.8s infinite alternate;}

@keyframes glow{
  from{box-shadow:0 0 5px yellow;}
  to{box-shadow:0 0 15px yellow;}
}

/* MESSAGE */
#msg{
  text-align:center;
  font-weight:bold;
  padding:4px;
}

/* END */
#endScreen{
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

/* CONFETTI */
.confetti{
  position:absolute;
  width:8px;
  height:14px;
  top:-20px;
  animation:fall 3s linear infinite;
}

@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="logoScreen">
  <img src="./LY1/Themes/farmers-market/assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="gameScreen">
  <div class="game">

    <!-- VERTICAL ZONES FIXED -->
    <div class="zones">

      <div class="zone zone-fruits" data-type="fruit">
        🍎 Fruits Zone
      </div>

      <div class="zone zone-veg" data-type="vegetable">
        🥕 Vegetables Zone
      </div>

    </div>

    <div id="msg">Tap a fruit or vegetable</div>

    <!-- OPTIONS -->
    <div class="options" id="options"></div>

  </div>
</div>

<!-- END -->
<div id="endScreen">
  <h1>🎉 Good Job!</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="./LY1/Themes/farmers-market/assets/correct.mp3"></audio>
<audio id="wrong" src="./LY1/Themes/farmers-market/assets/wrong.mp3"></audio>
<audio id="clap" src="./LY1/Themes/farmers-market/assets/claps.mp3"></audio>

<script>

const items = [
  "fruit-1.png","fruit-2.png","fruit-3.png","fruit-4.png","fruit-5.png",
  "fruit-6.png","fruit-7.png","fruit-8.png","fruit-9.png","fruit-10.png",
  "vegetable-1.png","vegetable-2.png","vegetable-3.png","vegetable-4.png","vegetable-5.png"
];

let selected=null;
let wrongCount={};
let score=0;

/* SPLASH */
setTimeout(()=>{
  document.getElementById("logoScreen").style.display="none";
  document.getElementById("gameScreen").style.display="block";
  load();
},2000);

/* LOAD ITEMS */
function load(){
  const box=document.getElementById("options");
  box.innerHTML="";

  items.sort(()=>Math.random()-0.5);

  items.forEach((img,i)=>{
    const div=document.createElement("div");
    div.className="item";

    const type = img.includes("fruit") ? "fruit" : "vegetable";

    div.dataset.type=type;
    div.dataset.id=i;

    div.innerHTML=`<img src="./LY1/Themes/farmers-market/assets/${img}">`;

    div.onclick=()=>{
      document.querySelectorAll(".item").forEach(x=>x.classList.remove("selected"));
      selected=div;
      div.classList.add("selected");
    };

    box.appendChild(div);
  });
}

/* SOUND */
function play(id){
  const s=document.getElementById(id);
  s.currentTime=0;
  s.play();
}

/* ZONE CLICK */
document.querySelectorAll(".zone").forEach(z=>{
  z.onclick=()=>{
    if(!selected) return;

    let correct = selected.dataset.type === z.dataset.type;
    let id = selected.dataset.id;

    wrongCount[id]=wrongCount[id]||0;

    if(correct){
      play("correct");
      selected.style.opacity="0.3";
      selected.onclick=null;
      selected=null;
      score++;

      if(score===items.length){
        setTimeout(()=>{
          play("clap");
          showEnd();
        },500);
      }

    }else{
      play("wrong");
      wrongCount[id]++;

      if(wrongCount[id]>=2){
        selected.classList.add("glow");
        msg.innerText="Correct answer highlighted";
      }else{
        msg.innerText="Try again!";
      }
    }
  };
});

function showEnd(){
  document.getElementById("endScreen").style.display="flex";

  for(let i=0;i<40;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=["#ffb347","#7ccf7a","#ff6b6b","#4dabf7"][i%4];
    document.body.appendChild(c);
  }
}

</script>

</body>
</html>
