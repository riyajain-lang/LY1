<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Farmers Market Sorting</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#fff;overflow:hidden;}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
#splash img{width:220px;max-width:70%;}

/* MAIN */
#game{
  display:none;
  height:100vh;
  flex-direction:column;
}

/* INSTRUCTION */
#instruction{
  background:#cde7c4;
  text-align:center;
  font-weight:bold;
  font-size:22px;
  padding:10px;
}

/* ZONES AREA */
.middle{
  flex:1;
  display:flex;
  justify-content:space-between;
  padding:10px;
  gap:10px;
}

/* BIG WORKSHEET FRAMES */
.zone{
  flex:1;
  border-radius:20px;
  position:relative;
  border:4px solid #ffb347;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* LEFT FRUIT FRAME */
.fruitZone{
  background:url("assets/fruits-zone-background.png") center/cover;
}

/* RIGHT VEG FRAME */
.vegZone{
  background:url("assets/vegetable-zone-background.png") center/cover;
  border-color:#7ccf7a;
}

/* LABELS */
.label{
  position:absolute;
  top:10px;
  background:white;
  padding:5px 15px;
  border-radius:12px;
  font-weight:bold;
}

/* BOTTOM OPTIONS (WORKSHEET STYLE ROW WRAP) */
.bottom{
  height:38%;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-content:flex-start;
  gap:10px;
  overflow:hidden;
}

/* SMALL OPTION CARDS (IMPORTANT FIX) */
.card{
  width:60px;
  height:60px;
  border:2px solid #ffd4a3;
  border-radius:12px;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.2s;
}

.card img{
  width:80%;
  height:80%;
  object-fit:contain;
}

/* SELECT */
.selected{
  outline:3px solid #2f80ed;
  transform:scale(1.05);
}

/* FEEDBACK */
#msg{
  text-align:center;
  font-weight:bold;
  padding:5px;
}

/* END SCREEN */
#end{
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:white;
  font-size:18px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game">

  <!-- INSTRUCTION -->
  <div id="instruction">
    Tap a fruit or vegetable, then tap zone
  </div>

  <!-- ZONES -->
  <div class="middle">

    <div id="fruitZone" class="zone fruitZone">
      <div class="label">Fruits</div>
    </div>

    <div id="vegZone" class="zone vegZone">
      <div class="label">Vegetables</div>
    </div>

  </div>

  <div id="msg">Let's sort the food!</div>

  <!-- OPTIONS -->
  <div class="bottom" id="board"></div>

</div>

<!-- END -->
<div id="end">
  <h1>🎉 Good Job!</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

let items = [];

for(let i=1;i<=10;i++){
  items.push({img:`assets/fruit-${i}.png`, type:"fruit"});
}
for(let i=1;i<=10;i++){
  items.push({img:`assets/vegetable-${i}.png`, type:"veg"});
}

let selected=null;
let score=0;
let wrong={};

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="flex";
  load();
},2000);

function load(){
  const board=document.getElementById("board");
  board.innerHTML="";

  items.sort(()=>Math.random()-0.5);

  items.forEach((it,i)=>{
    const div=document.createElement("div");
    div.className="card";
    div.dataset.type=it.type;
    div.dataset.id=i;

    div.innerHTML=`<img src="${it.img}">`;

    div.onclick=()=>{
      document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
      selected=div;
      div.classList.add("selected");
    };

    board.appendChild(div);
  });
}

function play(id){
  const s=document.getElementById(id);
  s.currentTime=0;
  s.play();
}

fruitZone.onclick=()=>check("fruit");
vegZone.onclick=()=>check("veg");

function check(zone){
  if(!selected) return;

  let id=selected.dataset.id;
  wrong[id]=wrong[id]||0;

  if(selected.dataset.type===zone){
    play("correct");

    selected.style.opacity="0.4";
    selected.onclick=null;
    selected.classList.remove("selected");

    selected=null;
    score++;

    if(score===20){
      play("clap");
      document.getElementById("end").style.display="flex";
    }

  }else{
    play("wrong");

    selected.style.transform="translateX(-5px)";
    setTimeout(()=>selected.style.transform="translateX(5px)",100);
  }
}

</script>

</body>
</html>
