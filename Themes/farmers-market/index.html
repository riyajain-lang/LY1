<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Farmers Market Sorting Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;}

body{
  background:#fff;
}

/* SPLASH */
#logoScreen{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
#logoScreen img{width:220px;max-width:70%;}

/* GAME WRAPPER */
#gameScreen{
  display:none;
  width:100%;
  height:100%;
}

/* MAIN LAYOUT */
.game{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
}

/* ZONES */
.zones{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:10px;
}

/* TOP FRUITS */
.zone-fruits{
  flex:1;
  background:url("./LY1/Themes/farmers-market/assets/fruits-zone-background.png") center/cover;
  border:3px solid #ffb347;
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:bold;
  color:#333;
}

/* MIDDLE VEG */
.zone-veg{
  flex:1;
  background:url("./LY1/Themes/farmers-market/assets/vegetable-zone-background.png") center/cover;
  border:3px solid #7ccf7a;
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:bold;
  color:#333;
}

/* BOTTOM OPTIONS */
.options{
  height:30%;
  background:#fff3e6;
  border-top:3px solid #ffb347;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:8px;
  padding:6px;
  overflow:hidden;
}

.item{
  width:60px;
  height:60px;
  border-radius:10px;
  border:2px solid #ccc;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  position:relative;
}

.item img{
  width:90%;
  height:90%;
  object-fit:contain;
}

.item.selected{
  outline:3px solid #0077ff;
  transform:scale(1.1);
}

.item.glow{
  animation: glow 0.8s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 5px #ff0;}
  to{box-shadow:0 0 15px #ff0;}
}

/* FEEDBACK */
#msg{
  text-align:center;
  font-weight:bold;
  font-size:18px;
  padding:4px;
}

/* END SCREEN */
#endScreen{
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

#endScreen h1{
  color:#2ecc71;
  margin-bottom:10px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:#ffb347;
  font-weight:bold;
  font-size:16px;
}

/* CONFETTI */
.confetti{
  position:absolute;
  width:8px;
  height:14px;
  top:-20px;
  animation:fall 3s linear infinite;
}
@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="logoScreen">
  <img src="./LY1/Themes/farmers-market/assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="gameScreen">
  <div class="game">

    <div class="zones">
      <div class="zone-fruits" data-type="fruit">🍎 Fruits Zone {img:fruits-zone-background.png}</div>
      <div class="zone-veg" data-type="vegetable">🥕 Vegetables Zone{img: vegetable-zone-background.png}</div>
    </div>

    <div id="msg">Tap a fruit or vegetable below</div>

    <div class="options" id="options"></div>

  </div>
</div>

<!-- END -->
<div id="endScreen">
  <h1>🎉 Good Job!</h1>
  <button onclick="restart()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="wrong" src="./LY1/Themes/farmers-market/assets/wrong.mp3"></audio>
<audio id="clap" src="./LY1/Themes/farmers-market/assets/claps.mp3"></audio>

<script>

const items = [
  {img:"fruit-1.png", type:"fruit"},
  {img:"fruit-2.png", type:"fruit"},
  {img:"fruit-3.png", type:"fruit"},
  {img:"fruit-4.png", type:"fruit"},
  {img:"fruit-5.png", type:"fruit"},
  {img:"fruit-6.png", type:"fruit"},
  {img:"fruit-7.png", type:"fruit"},
  {img:"fruit-8.png", type:"fruit"},
  {img:"fruit-9.png", type:"fruit"},
  {img:"fruit-10.png", type:"fruit"},

  {img:"vegetable-1.png", type:"vegetable"},
  {img:"vegetable-2.png", type:"vegetable"},
  {img:"vegetable-3.png", type:"vegetable"},
  {img:"vegetable-4.png", type:"vegetable"},
  {img:"vegetable-5.png", type:"vegetable"},
  {img:"vegetable-6.png", type:"vegetable"},
  {img:"vegetable-7.png", type:"vegetable"},
  {img:"vegetable-8.png", type:"vegetable"},
  {img:"vegetable-9.png", type:"vegetable"},
  {img:"vegetable-10.png", type:"vegetable"}
];

let selected=null;
let wrongCount={};
let score=0;

function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

/* SPLASH */
setTimeout(()=>{
  document.getElementById("logoScreen").style.display="none";
  document.getElementById("gameScreen").style.display="block";
  loadGame();
},2000);

function loadGame(){
  const box=document.getElementById("options");
  box.innerHTML="";
  shuffle(items).forEach((it,i)=>{
    let div=document.createElement("div");
    div.className="item";
    div.dataset.type=it.type;
    div.dataset.id=i;

    div.innerHTML=`<img src="./LY1/Themes/farmers-market/assets/${it.img}">`;

    div.onclick=()=>{
      document.querySelectorAll(".item").forEach(x=>x.classList.remove("selected"));
      selected=div;
      div.classList.add("selected");
    };

    box.appendChild(div);
  });
}

/* SOUND */
function play(id){
  let s=document.getElementById(id);
  s.currentTime=0;
  s.play();
}

/* ZONE CLICK */
document.querySelectorAll(".zone-fruits,.zone-veg").forEach(z=>{
  z.onclick=()=>{
    if(!selected) return;

    let correct=selected.dataset.type===z.dataset.type;
    let id=selected.dataset.id;

    wrongCount[id]=wrongCount[id]||0;

    if(correct){
      play("correct");
      selected.style.opacity="0.3";
      selected.onclick=null;
      selected.classList.remove("selected");
      selected=null;
      score++;

      if(score===items.length){
        setTimeout(()=>{
          play("clap");
          showEnd();
        },500);
      }
    }else{
      play("wrong");
      wrongCount[id]++;

      if(wrongCount[id]>=2){
        selected.classList.add("glow");
        document.getElementById("msg").innerText="Correct answer shown!";
      }else{
        document.getElementById("msg").innerText="Try again!";
      }
    }
  };
});

/* END */
function showEnd(){
  document.getElementById("endScreen").style.display="flex";
  for(let i=0;i<40;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=["#ffb347","#7ccf7a","#ff6b6b","#4dabf7"][i%4];
    document.body.appendChild(c);
  }
}

function restart(){
  location.reload();
}

</script>

</body>
</html>
