<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Farmers Market Sorting Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{overflow:hidden;background:#fff}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
#splash img{max-width:70%}

/* GAME */
#game{
  display:none;
  height:100vh;
  flex-direction:column;
  padding:8px;
  gap:8px;
}

.title{
  text-align:center;
  font-weight:bold;
  background:#ffd54f;
  padding:8px;
  border-radius:12px;
}

/* ZONES */
.top{
  flex:1;
  display:flex;
  gap:10px;
}

.zone{
  flex:1;
  border-radius:20px;
  border:4px solid #f4b400;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  font-size:18px;
  position:relative;
}

.fruit{
  background:url('assets/fruits-zone-background.png') center/cover;
}

.veg{
  background:url('assets/vegetable-zone-background.png') center/cover;
}

.glow{
  box-shadow:0 0 20px gold;
}

/* OPTIONS (BOTTOM 30%) */
.options{
  height:30%;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
  padding:6px;
  overflow:hidden;
}

.card{
  background:#fff;
  border:3px solid #ffd166;
  border-radius:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.card img{
  width:90%;
  height:90%;
  object-fit:contain;
}

.selected{
  outline:3px solid #4caf50;
  transform:scale(1.05);
}

.wiggle{
  animation: wiggle 0.4s;
}

@keyframes wiggle{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  75%{transform:translateX(5px)}
}

/* SCORE */
.info{
  text-align:center;
  font-weight:bold;
}

/* END */
#end{
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* BUTTON */
button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:#fff;
  font-size:18px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game">
  <div class="title">🍎 Farmers Market Sorting</div>

  <div class="top">
    <div id="fruitZone" class="zone fruit">Fruits</div>
    <div id="vegZone" class="zone veg">Vegetables</div>
  </div>

  <div class="info">Score: <span id="score">0</span> / 20</div>

  <div id="options" class="options"></div>
</div>

<!-- END -->
<div id="end">
  <h1>🎉 Good Job!</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

let items = [];
for(let i=1;i<=10;i++){
  items.push({img:`assets/fruit-${i}.png`, type:'fruit'});
}
for(let i=1;i<=10;i++){
  items.push({img:`assets/vegetable-${i}.png`, type:'veg'});
}

let selected=null;
let score=0;
let wrongCount={};

const splash=document.getElementById("splash");
const game=document.getElementById("game");

setTimeout(()=>{
  splash.style.display="none";
  game.style.display="flex";
  load();
},2000);

function load(){
  const box=document.getElementById("options");
  box.innerHTML="";

  shuffle(items).forEach((it,i)=>{
    const div=document.createElement("div");
    div.className="card";
    div.dataset.type=it.type;
    div.dataset.id=i;

    div.innerHTML=`<img src="${it.img}">`;

    div.onclick=()=>{
      document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
      selected=div;
      div.classList.add("selected");
    };

    box.appendChild(div);
  });
}

function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

function play(id){
  const s=document.getElementById(id);
  s.currentTime=0;
  s.play();
}

fruitZone.onclick=()=>check("fruit");
vegZone.onclick=()=>check("veg");

function check(zone){
  if(!selected) return;

  let id=selected.dataset.id;
  wrongCount[id]=wrongCount[id]||0;

  if(selected.dataset.type===zone){
    play("correct");

    selected.style.opacity="0.4";
    selected.onclick=null;
    selected.classList.remove("selected");

    score++;
    document.getElementById("score").innerText=score;

    selected=null;

    if(score===20){
      setTimeout(()=>{
        play("clap");
        document.getElementById("end").style.display="flex";
      },500);
    }

  }else{
    play("wrong");
    wrongCount[id]++;

    selected.classList.remove("wiggle");
    void selected.offsetWidth;
    selected.classList.add("wiggle");

    if(wrongCount[id]>=2){
      if(selected.dataset.type==="fruit"){
        fruitZone.classList.add("glow");
      }else{
        vegZone.classList.add("glow");
      }
    }
  }
}

</script>

</body>
</html>
