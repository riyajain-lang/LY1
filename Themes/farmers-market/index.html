<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Farmers Market Sorting</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{overflow:hidden;background:#fff}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
#splash img{width:200px;max-width:70%;}

/* GAME WRAPPER */
#game{
  display:none;
  height:100vh;
  flex-direction:column;
}

/* TOP ZONES (SMALLER NOW) */
.top{
  flex:1;
  display:flex;
  gap:10px;
  padding:8px;
}

.zone{
  flex:1;
  border-radius:18px;
  border:3px solid #ffb347;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  font-size:22px; /* INCREASED TEXT */
  overflow:hidden;
}

/* BACKGROUNDS */
.fruitZone{
  background:url("assets/fruits-zone-background.png") center/cover;
}

.vegZone{
  background:url("assets/vegetable-zone-background.png") center/cover;
  border-color:#7ccf7a;
}

/* INSTRUCTION (BIGGER) */
#instruction{
  text-align:center;
  font-size:22px;
  font-weight:900;
  padding:4px;
  color:#333;
}

/* SCORE */
#scoreBox{
  text-align:center;
  font-weight:bold;
  font-size:18px;
}

/* OPTIONS AREA (FIXED GRID 20 ITEMS FIT) */
.bottom{
  height:32%;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(4,1fr);
  gap:6px;
  padding:6px;
  overflow:hidden;
}

/* SMALL OPTION CARDS */
.card{
  border:2px solid #ffd4a3;
  border-radius:10px;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
}

.card img{
  width:70%;
  height:70%;
  object-fit:contain;
}

/* SELECT */
.selected{
  outline:3px solid #2f80ed;
  transform:scale(1.05);
}

/* MOVE ANIMATION TO ZONE */
.moveToZone{
  position:fixed;
  width:60px;
  height:60px;
  z-index:999;
  transition:all 0.5s ease;
}

/* END */
#end{
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
button{
  padding:12px 18px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:#fff;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game">

  <div class="top">

    <div id="fruitZone" class="zone fruitZone">
      🍎 Fruits
    </div>

    <div id="vegZone" class="zone vegZone">
      🥕 Vegetables
    </div>

  </div>

  <div id="instruction">Tap an item, then tap correct zone</div>
  <div id="scoreBox">Score: <span id="score">0</span>/20</div>

  <div class="bottom" id="board"></div>

</div>

<!-- END -->
<div id="end">
  <h1>🎉 Good Job!</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

let items = [];

for(let i=1;i<=10;i++){
  items.push({img:`assets/fruit-${i}.png`, type:"fruit"});
}
for(let i=1;i<=10;i++){
  items.push({img:`assets/vegetable-${i}.png`, type:"veg"});
}

let selected=null;
let score=0;
let wrong={};

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="flex";
  load();
},2000);

function load(){
  const board=document.getElementById("board");
  board.innerHTML="";

  items.sort(()=>Math.random()-0.5);

  items.forEach((it,i)=>{
    const div=document.createElement("div");
    div.className="card";
    div.dataset.type=it.type;
    div.dataset.id=i;

    div.innerHTML=`<img src="${it.img}">`;

    div.onclick=()=>{
      document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
      selected=div;
      div.classList.add("selected");
    };

    board.appendChild(div);
  });
}

/* SOUND */
function play(id){
  const s=document.getElementById(id);
  s.currentTime=0;
  s.play();
}

/* ZONES */
fruitZone.onclick=()=>check("fruit");
vegZone.onclick=()=>check("veg");

function check(zone){
  if(!selected) return;

  let id=selected.dataset.id;
  wrong[id]=wrong[id]||0;

  if(selected.dataset.type===zone){

    play("correct");
    play("clap");

    // MOVE IMAGE INTO ZONE
    let clone = selected.cloneNode(true);
    clone.classList.add("moveToZone");
    document.body.appendChild(clone);

    let zoneEl = zone==="fruit"?fruitZone:vegZone;
    let rect = zoneEl.getBoundingClientRect();

    clone.style.left = selected.getBoundingClientRect().left + "px";
    clone.style.top = selected.getBoundingClientRect().top + "px";

    setTimeout(()=>{
      clone.style.left = rect.left + rect.width/2 + "px";
      clone.style.top = rect.top + rect.height/2 + "px";
      clone.style.opacity = "0";
    },50);

    setTimeout(()=>clone.remove(),600);

    selected.style.visibility="hidden";
    selected.onclick=null;
    selected=null;

    score++;
    document.getElementById("score").innerText=score;

    if(score===20){
      setTimeout(()=>{
        document.getElementById("end").style.display="flex";
      },600);
    }

  }else{
    play("wrong");

    selected.style.transform="translateX(-5px)";
    setTimeout(()=>selected.style.transform="translateX(5px)",100);
  }
}

</script>

</body>
</html>
