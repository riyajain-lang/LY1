<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Farmers Market Sorting</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#fff;overflow:hidden;}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
#splash img{width:220px;max-width:70%;}

/* GAME WRAPPER */
#game{
  display:none;
  height:100vh;
  flex-direction:column;
}

/* TOP ZONES (VERTICAL LEFT/RIGHT) */
.top{
  flex:1;
  display:flex;
  padding:10px;
  gap:10px;
}

/* LEFT FRUIT */
.zone{
  flex:1;
  border-radius:18px;
  border:4px solid #ffb347;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  font-size:18px;
}

/* RIGHT VEG */
.fruitZone{
  background:url("assets/fruits-zone-background.png") center/cover;
}

.vegZone{
  background:url("assets/vegetable-zone-background.png") center/cover;
  border-color:#7ccf7a;
}

/* ZONE LABEL */
.label{
  position:absolute;
  top:8px;
  background:white;
  padding:5px 14px;
  border-radius:10px;
  font-weight:bold;
}

/* OPTIONS PANEL */
.bottom{
  height:35%;
  background:#fff8ee;
  border-top:3px solid #ffb347;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  padding:8px;
}

/* OPTION CARD */
.card{
  background:#fff;
  border:3px solid #ffd4a3;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.2s;
  position:relative;
}

.card img{
  width:80%;
  height:80%;
  object-fit:contain;
}

/* SELECTED */
.selected{
  outline:3px solid #2f80ed;
  transform:scale(1.05);
}

/* REMOVE ANIMATION */
.remove{
  animation:fadeOut 0.4s forwards;
}

@keyframes fadeOut{
  to{opacity:0;transform:scale(0);}
}

/* FEEDBACK */
#msg{
  text-align:center;
  font-weight:bold;
  padding:5px;
  font-size:16px;
}

/* END SCREEN */
#end{
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:14px;
  background:#4caf50;
  color:white;
  font-size:18px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game">

  <!-- ZONES LEFT/RIGHT VERTICAL -->
  <div class="top">

    <div id="fruitZone" class="zone fruitZone">
      <div class="label">Fruits</div>
    </div>

    <div id="vegZone" class="zone vegZone">
      <div class="label">Vegetables</div>
    </div>

  </div>

  <div id="msg">Tap a fruit or vegetable, then tap zone</div>

  <!-- OPTIONS GRID -->
  <div class="bottom" id="board"></div>

</div>

<!-- END -->
<div id="end">
  <h1>🎉 Good Job!</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

let items = [
  ...Array.from({length:10},(_,i)=>({img:`assets/fruit-${i+1}.png`,type:"fruit"})),
  ...Array.from({length:10},(_,i)=>({img:`assets/vegetable-${i+1}.png`,type:"veg"}))
];

let selected=null;
let score=0;
let wrong={};

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="flex";
  load();
},2000);

function load(){
  const board=document.getElementById("board");
  board.innerHTML="";

  shuffle(items).forEach((it,i)=>{
    const div=document.createElement("div");
    div.className="card";
    div.dataset.type=it.type;
    div.dataset.id=i;

    div.innerHTML=`<img src="${it.img}">`;

    div.onclick=()=>{
      document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
      selected=div;
      div.classList.add("selected");
    };

    board.appendChild(div);
  });
}

function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

function play(id){
  const s=document.getElementById(id);
  s.currentTime=0;
  s.play();
}

/* ZONE LOGIC */
fruitZone.onclick=()=>check("fruit");
vegZone.onclick=()=>check("veg");

function check(zone){
  if(!selected) return;

  let id=selected.dataset.id;
  wrong[id]=wrong[id]||0;

  if(selected.dataset.type===zone){
    play("correct");

    selected.classList.add("remove");
    setTimeout(()=>selected.remove(),400);

    selected=null;
    score++;

    if(score===20){
      setTimeout(()=>{
        play("clap");
        document.getElementById("end").style.display="flex";
      },500);
    }

  }else{
    play("wrong");
    wrong[id]++;

    selected.style.transform="translateX(-5px)";
    setTimeout(()=>selected.style.transform="translateX(5px)",100);
  }
}

</script>

</body>
</html>
