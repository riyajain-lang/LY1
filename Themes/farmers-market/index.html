<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Farmers Market Sorting Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{overflow:hidden;background:#fff}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
#splash img{width:220px;max-width:70%;}

/* GAME */
#game{
  display:none;
  height:100vh;
  flex-direction:column;
}

/* INSTRUCTION */
#instruction{
  background:#cde7c4;
  text-align:center;
  font-weight:bold;
  font-size:22px;
  padding:10px;
}

/* ZONES */
.middle{
  flex:1;
  display:flex;
  justify-content:space-between;
  padding:10px;
  gap:10px;
}

.zone{
  flex:1;
  border-radius:20px;
  position:relative;
  border:4px solid #ffb347;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  font-size:20px;
  font-weight:bold;
}

.fruitZone{
  background:url("assets/fruits-zone-background.png") center/cover;
}

.vegZone{
  background:url("assets/vegetable-zone-background.png") center/cover;
  border-color:#7ccf7a;
}

/* OPTIONS */
.bottom{
  height:38%;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-content:flex-start;
  gap:10px;
}

/* OPTION CARD */
.card{
  width:90px;
  height:90px;
  border:2px solid #ffd4a3;
  border-radius:14px;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.card img{
  width:90%;
  height:90%;
  object-fit:contain;
}

/* SELECT */
.selected{
  outline:3px solid #2f80ed;
  transform:scale(1.05);
}

/* END */
#end{
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* CONFETTI */
.confetti{
  position:fixed;
  width:8px;
  height:8px;
  top:-10px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game">

  <div id="instruction">Tap a fruit or vegetable, then tap zone</div>

  <div class="middle">

    <div id="fruitZone" class="zone fruitZone">🍎 Fruits</div>
    <div id="vegZone" class="zone vegZone">🥕 Vegetables</div>

  </div>

  <div id="msg" style="text-align:center;font-weight:bold;"></div>

  <div class="bottom" id="board"></div>

</div>

<!-- END -->
<div id="end">
  <h1>🎉 Good Job!</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

let allItems = [];

for(let i=1;i<=10;i++) allItems.push({img:`assets/fruit-${i}.png`,type:"fruit"});
for(let i=1;i<=10;i++) allItems.push({img:`assets/vegetable-${i}.png`,type:"veg"});

let selected=null;
let score=0;
let wrong={};
let slide=0;

let slides=[];

/* SPLIT INTO 4 SLIDES OF 5 ITEMS EACH */
for(let i=0;i<allItems.length;i+=5){
  slides.push(allItems.slice(i,i+5));
}

/* SHUFFLE EACH SLIDE */
slides.forEach(s=>s.sort(()=>Math.random()-0.5));

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="flex";
  loadSlide();
},2000);

function loadSlide(){
  const board=document.getElementById("board");
  board.innerHTML="";
  selected=null;

  let items=slides[slide];

  items.forEach((it,i)=>{
    const div=document.createElement("div");
    div.className="card";
    div.dataset.type=it.type;
    div.dataset.id=slide+"-"+i;

    div.innerHTML=`<img src="${it.img}">`;

    div.onclick=()=>{
      document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
      selected=div;
      div.classList.add("selected");
    };

    board.appendChild(div);
  });
}

/* SOUND */
function play(id){
  const s=document.getElementById(id);
  s.currentTime=0;
  s.play();
}

/* CONFETTI */
function confetti(){
  for(let i=0;i<120;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=["#ffb347","#7ccf7a","#ff6b6b","#4dabf7","#ffd93d"][i%5];
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}

/* ZONES */
fruitZone.onclick=()=>check("fruit");
vegZone.onclick=()=>check("veg");

function check(zone){
  if(!selected) return;

  let id=selected.dataset.id;
  wrong[id]=wrong[id]||0;

  if(selected.dataset.type===zone){

    play("correct");
    play("clap");

    selected.style.opacity="0.4";
    selected.onclick=null;

    selected=null;
    score++;

    if(score % 5 === 0){
      slide++;
      if(slide < slides.length){
        setTimeout(loadSlide,500);
      }else{
        setTimeout(()=>{
          confetti();
          document.getElementById("end").style.display="flex";
        },500);
      }
    }

  }else{
    play("wrong");
    selected.style.transform="translateX(-5px)";
    setTimeout(()=>selected.style.transform="translateX(5px)",100);
  }
}

</script>

</body>
</html>
