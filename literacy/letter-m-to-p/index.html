<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter Tap Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body,html{width:100%;height:100%;font-family:'Comic Sans MS',sans-serif;display:flex;justify-content:center;align-items:center;overflow:hidden;}
.screen{display:none;width:100%;height:100%;flex-direction:column;justify-content:center;align-items:center;position:relative;background-size:cover;background-position:center;}
.screen.active{display:flex;}
.logo-screen{background:white;}
.logo-screen img{width:200px;height:auto;}
.question{font-size:2em;margin-bottom:10px;color:#ffb347;text-shadow:1px 1px #555;text-align:center;}
.letter-center{width:120px;height:120px;margin-bottom:20px;}
.images{position:relative;width:100%;max-width:400px;height:400px;}
.images img{width:80px;height:80px;position:absolute;cursor:pointer;border:3px solid #ffb347;border-radius:20px;transition:all 0.3s ease;}
.images img.giggle{animation:giggle 0.5s;}
@keyframes giggle{0%{transform:rotate(0deg);}25%{transform:rotate(15deg);}50%{transform:rotate(-15deg);}75%{transform:rotate(15deg);}100%{transform:rotate(0deg);}}
.images img.glow{box-shadow:0 0 15px 5px #32cd32;}
.tick{position:absolute;width:80px;height:80px;top:10px;right:10px;display:none;}
.end-screen{flex-direction:column;justify-content:center;align-items:center;background:#fff8dc;}
.end-screen button{padding:15px 30px;font-size:1.5em;border:none;border-radius:10px;background:#32cd32;color:white;cursor:pointer;margin-top:20px;}
canvas{position:absolute;top:0;left:0;pointer-events:none;}
</style>
</head>
<body>

<!-- Slide 1: Logo -->
<div class="screen logo-screen active">
  <img src="assets/innovine-logo.png" alt="Logo">
</div>

<!-- Question Slide -->
<div class="screen question-screen" style="background-image:url('assets/background.png');">
  <div class="question" id="letterPrompt">Letter?</div>
  <img id="letterCenter" class="letter-center" src="" alt="">
  <div class="images" id="imageContainer"></div>
  <img src="assets/tick.png" class="tick" id="tickMark">
</div>

<!-- End Slide -->
<div class="screen end-screen" style="background-image:url('assets/background.png');">
  <h1>Good Job!</h1>
  <canvas id="confettiCanvas"></canvas>
  <button id="playAgainBtn">Play Again</button>
</div>

<!-- Audio -->
<audio id="correctAudio" src="assets/correct.mp3"></audio>
<audio id="wrongAudio" src="assets/wrong.mp3"></audio>
<audio id="clapAudio" src="assets/freesound_community-claps-44774.mp3"></audio>
<audio id="letterAudio"></audio>

<script>
const screens = {
  logo: document.querySelector('.logo-screen'),
  question: document.querySelector('.question-screen'),
  end: document.querySelector('.end-screen')
};
const letterPrompt = document.getElementById('letterPrompt');
const letterCenter = document.getElementById('letterCenter');
const imageContainer = document.getElementById('imageContainer');
const tickMark = document.getElementById('tickMark');
const playAgainBtn = document.getElementById('playAgainBtn');
const correctAudio = document.getElementById('correctAudio');
const wrongAudio = document.getElementById('wrongAudio');
const clapAudio = document.getElementById('clapAudio');
const letterAudio = document.getElementById('letterAudio');

// Questions with exact placement
const questions = [
  {
    letter:"M", prompt:"M For?", audio:"assets/m-for.mp3", letterImg:"assets/m.png",
    images:[
      {src:"assets/mango.png", correct:true, x:10, y:10},     // top-left
      {src:"assets/monkey.png", correct:true, x:70, y:10},    // top-right
      {src:"assets/moon.png", correct:true, x:40, y:70},      // bottom-center
      {src:"assets/nest.png", correct:false, x:10, y:50},     // middle-left
      {src:"assets/octopus.png", correct:false, x:70, y:50},  // middle-right
      {src:"assets/panda.png", correct:false, x:40, y:30}     // top-center
    ]
  },
  {
    letter:"O", prompt:"O For?", audio:"assets/o-for.mp3", letterImg:"assets/o.png",
    images:[
      {src:"assets/orange.png", correct:true, x:10, y:10},
      {src:"assets/octopus.png", correct:true, x:70, y:10},
      {src:"assets/owl.png", correct:true, x:40, y:70},
      {src:"assets/pumpkin.png", correct:false, x:10, y:50},
      {src:"assets/moon.png", correct:false, x:70, y:50},
      {src:"assets/parrot.png", correct:false, x:40, y:30}
    ]
  },
  {
    letter:"N", prompt:"N For?", audio:"assets/n-for.mp3", letterImg:"assets/n.png",
    images:[
      {src:"assets/net.png", correct:true, x:40, y:70},
      {src:"assets/nest.png", correct:true, x:10, y:10},
      {src:"assets/mango.png", correct:false, x:70, y:10},
      {src:"assets/monkey.png", correct:false, x:10, y:50},
      {src:"assets/orange.png", correct:false, x:70, y:50},
      {src:"assets/parrot.png", correct:false, x:40, y:30}
    ]
  },
  {
    letter:"P", prompt:"P For?", audio:"assets/p-for.mp3", letterImg:"assets/p.png",
    images:[
      {src:"assets/pumpkin.png", correct:true, x:10, y:10},
      {src:"assets/panda.png", correct:true, x:70, y:10},
      {src:"assets/parrot.png", correct:true, x:40, y:70},
      {src:"assets/orange.png", correct:false, x:10, y:50},
      {src:"assets/net.png", correct:false, x:70, y:50},
      {src:"assets/nest.png", correct:false, x:40, y:30}
    ]
  }
];

let currentQ=0, selectedCount=0, wrongAttempts=0;

// Show logo for 2s
setTimeout(()=>{ screens.logo.classList.remove('active'); showQuestion(); }, 2000);

function shuffle(array){ return array.sort(()=>Math.random()-0.5); }

function showQuestion(){
  const q = questions[currentQ];
  letterPrompt.textContent = q.prompt;
  letterCenter.src = q.letterImg;
  imageContainer.innerHTML = "";
  selectedCount=0; wrongAttempts=0; tickMark.style.display="none";
  letterAudio.src = q.audio; letterAudio.play();

  const shuffled = shuffle([...q.images]);
  shuffled.forEach(i=>{
    const img = document.createElement('img');
    img.src = i.src;
    img.dataset.correct=i.correct;
    img.style.left = i.x+'%';
    img.style.top = i.y+'%';
    img.addEventListener('click', handleClick);
    imageContainer.appendChild(img);
  });

  screens.question.classList.add('active');
}

function handleClick(e){
  const img = e.target;
  const isCorrect = img.dataset.correct==='true';
  if(isCorrect){
    img.style.opacity=0.5;
    selectedCount++;
    correctAudio.currentTime=0; correctAudio.play();
    tickMark.style.display='block';
    setTimeout(()=>{tickMark.style.display='none';},500);
    if(selectedCount === questions[currentQ].images.filter(i=>i.correct).length){
      currentQ++;
      if(currentQ>=questions.length){
        screens.question.classList.remove('active');
        screens.end.classList.add('active');
        startConfetti();
        clapAudio.play();
      } else setTimeout(showQuestion,700);
    }
  } else {
    wrongAttempts++;
    wrongAudio.currentTime=0; wrongAudio.play();
    img.classList.add('giggle');
    setTimeout(()=>{img.classList.remove('giggle');},500);
    if(wrongAttempts>=2){
      Array.from(imageContainer.children).forEach(i=>{
        if(i.dataset.correct==='true') i.classList.add('glow');
      });
    }
  }
}

playAgainBtn.addEventListener('click',()=>{
  currentQ=0;
  screens.end.classList.remove('active');
  showQuestion();
});

// Confetti
function startConfetti(){
  const canvas = document.getElementById('confettiCanvas');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const ctx = canvas.getContext('2d');
  const confetti=[];
  const confettiCount=150;
  for(let i=0;i<confettiCount;i++){
    confetti.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height-canvas.height,
      r:Math.random()*6+4,
      d:Math.random()*confettiCount,
      color:`hsl(${Math.random()*360},100%,50%)`,
      tilt:Math.random()*10-10,
      tiltAngleIncrement:Math.random()*0.07+0.05,
      tiltAngle:0
    });
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confetti.forEach(c=>{
      ctx.beginPath();
      ctx.lineWidth=c.r;
      ctx.strokeStyle=c.color;
      ctx.moveTo(c.x+c.tilt+c.r/2,c.y);
      ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/2);
      ctx.stroke();
    });
    update();
    requestAnimationFrame(draw);
  }
  function update(){
    confetti.forEach(c=>{
      c.tiltAngle+=c.tiltAngleIncrement;
      c.y += (Math.cos(c.d)+1+c.r/2)/2;
      c.x += Math.sin(c.d);
      c.tilt=Math.sin(c.tiltAngle)*15;
      if(c.y>canvas.height){
        c.y=-10;
        c.x=Math.random()*canvas.width;
      }
    });
  }
  draw();
}
</script>
</body>
</html>
