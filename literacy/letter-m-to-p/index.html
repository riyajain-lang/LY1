<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter Game - Preschool Year 4</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body, html { width:100%; height:100%; font-family: 'Comic Sans MS', sans-serif; display:flex; justify-content:center; align-items:center; background:#f0f8ff; overflow:hidden;}
  .screen { display:none; width:100%; height:100%; flex-direction:column; justify-content:center; align-items:center; position:relative; }
  .screen.active { display:flex; }
  .logo-screen { background:#fff; }
  .logo-screen img { width:200px; height:auto; }
  .question { font-size:2em; margin-bottom:20px; color:#ffb347; text-shadow:1px 1px #555; }
  .images { display:flex; flex-wrap:wrap; justify-content:center; gap:15px; }
  .images img { width:120px; height:120px; border:3px solid #ffb347; border-radius:20px; cursor:pointer; transition: all 0.3s ease; }
  .images img.giggle { animation: giggle 0.5s; }
  @keyframes giggle { 0%{transform:rotate(0deg);}25%{transform:rotate(15deg);}50%{transform:rotate(-15deg);}75%{transform:rotate(15deg);}100%{transform:rotate(0deg);} }
  .images img.glow { box-shadow: 0 0 15px 5px #32cd32; }
  .tick { position:absolute; width:80px; height:80px; top:10px; right:10px; display:none; }
  .end-screen { flex-direction:column; background:#fff8dc; justify-content:center; align-items:center; }
  .end-screen button { padding:15px 30px; font-size:1.5em; border:none; border-radius:10px; background:#32cd32; color:#fff; cursor:pointer; margin-top:20px; }
</style>
</head>
<body>

<!-- Slide 1: Logo -->
<div class="screen logo-screen active">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Slide 2+: Questions -->
<div class="screen question-screen">
  <div class="question" id="letterPrompt">M For?</div>
  <div class="images" id="imageContainer"></div>
  <img src="assets/tick.png" class="tick" id="tickMark">
</div>

<!-- End Slide -->
<div class="screen end-screen">
  <h1>Good Job!</h1>
  <canvas id="confettiCanvas"></canvas>
  <button id="playAgainBtn">Play Again</button>
</div>

<audio id="correctAudio" src="assets/correct.mp3"></audio>
<audio id="wrongAudio" src="assets/wrong.mp3"></audio>
<audio id="clapAudio" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const logoScreen = document.querySelector('.logo-screen');
const questionScreen = document.querySelector('.question-screen');
const endScreen = document.querySelector('.end-screen');
const imageContainer = document.getElementById('imageContainer');
const letterPrompt = document.getElementById('letterPrompt');
const tickMark = document.getElementById('tickMark');
const playAgainBtn = document.getElementById('playAgainBtn');

const correctAudio = document.getElementById('correctAudio');
const wrongAudio = document.getElementById('wrongAudio');
const clapAudio = document.getElementById('clapAudio');

const questions = [
  {
    letter: "M",
    prompt: "M For?",
    images: [
      {src:"assets/mango.png", correct:true},
      {src:"assets/monkey.png", correct:true},
      {src:"assets/panda.png", correct:false},
      {src:"assets/owl.png", correct:false},
      {src:"assets/pumpkin.png", correct:false},
      {src:"assets/moon.png", correct:true}
    ]
  },
  {
    letter: "P",
    prompt: "P For?",
    images: [
      {src:"assets/panda.png", correct:true},
      {src:"assets/parrot.png", correct:true},
      {src:"assets/owl.png", correct:false},
      {src:"assets/pumpkin.png", correct:true},
      {src:"assets/mango.png", correct:false},
      {src:"assets/monkey.png", correct:false}
    ]
  }
  // Add more questions here
];

let currentQ = 0;
let selectedCount = 0;
let wrongAttempts = 0;

// Show logo for 2s then start game
setTimeout(() => {
  logoScreen.classList.remove('active');
  showQuestion();
}, 2000);

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function showQuestion(){
  const q = questions[currentQ];
  letterPrompt.textContent = q.prompt;
  imageContainer.innerHTML = "";
  selectedCount = 0;
  wrongAttempts = 0;
  tickMark.style.display = 'none';
  questionScreen.classList.add('active');

  const shuffled = shuffle([...q.images]);
  shuffled.forEach(imgObj => {
    const img = document.createElement('img');
    img.src = imgObj.src;
    img.dataset.correct = imgObj.correct;
    img.addEventListener('click', handleClick);
    imageContainer.appendChild(img);
  });
}

function handleClick(e){
  const img = e.target;
  const isCorrect = img.dataset.correct === 'true';

  if(isCorrect){
    img.style.opacity = 0.5;
    selectedCount++;
    correctAudio.currentTime = 0;
    correctAudio.play();
    tickMark.style.display = 'block';
    setTimeout(()=>{tickMark.style.display='none';},500);
    if(selectedCount === questions[currentQ].images.filter(i=>i.correct).length){
      currentQ++;
      if(currentQ >= questions.length){
        endScreen.classList.add('active');
        questionScreen.classList.remove('active');
        startConfetti();
        clapAudio.play();
      } else {
        setTimeout(showQuestion,700);
      }
    }
  } else {
    wrongAttempts++;
    wrongAudio.currentTime = 0;
    wrongAudio.play();
    img.classList.add('giggle');
    setTimeout(()=>{img.classList.remove('giggle');},500);

    if(wrongAttempts >=2){
      // highlight remaining correct options
      Array.from(imageContainer.children).forEach(i=>{
        if(i.dataset.correct==='true') i.classList.add('glow');
      });
    }
  }
}

playAgainBtn.addEventListener('click',()=>{
  endScreen.classList.remove('active');
  currentQ=0;
  showQuestion();
});

// Confetti
function startConfetti(){
  const canvas = document.getElementById('confettiCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const confetti = [];
  const confettiCount = 150;

  for(let i=0;i<confettiCount;i++){
    confetti.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height- canvas.height,
      r:Math.random()*6+4,
      d:Math.random()*confettiCount,
      color:`hsl(${Math.random()*360},100%,50%)`,
      tilt:Math.random()*10-10,
      tiltAngleIncrement:Math.random()*0.07+0.05,
      tiltAngle:0
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confetti.forEach((c,i)=>{
      ctx.beginPath();
      ctx.lineWidth=c.r;
      ctx.strokeStyle=c.color;
      ctx.moveTo(c.x+c.tilt+ c.r/2, c.y);
      ctx.lineTo(c.x+c.tilt, c.y+c.tilt+ c.r/2);
      ctx.stroke();
    });
    update();
    requestAnimationFrame(draw);
  }

  function update(){
    confetti.forEach((c,i)=>{
      c.tiltAngle += c.tiltAngleIncrement;
      c.y += (Math.cos(c.d)+1+c.r/2)/2;
      c.x += Math.sin(c.d);
      c.tilt = Math.sin(c.tiltAngle)*15;

      if(c.y>canvas.height){
        c.y = -10;
        c.x = Math.random()*canvas.width;
      }
    });
  }
  draw();
}
</script>

</body>
</html>
