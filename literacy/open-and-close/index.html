<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open & Close - Let's Learn!</title>
<style>
    @font-face {
        font-family: 'Melisen';
        src: url('assets/Melisen.ttf') format('truetype'); /* Replace with actual font file */
        font-weight: normal;
        font-style: normal;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #ffffff; }
    #game-container {
        width: 100%;
        max-width: 480px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 10px;
        font-family: 'Melisen', serif;
    }
    #logo-screen, #question-screen, #end-screen {
        width: 100%;
        height: 100%;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: #000;
    }
    #logo-screen img { width: 50%; max-width: 200px; }
    #header {
        font-size: 2.2rem;
        font-weight: bold;
        margin-bottom: 10px;
        background: linear-gradient(90deg, #4caf50, #9c27b0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-family: 'Melisen', serif;
    }
    #sub-header {
        font-size: 1.3rem;
        margin-bottom: 20px;
        background: linear-gradient(90deg, #81c784, #ba68c8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-family: 'Melisen', serif;
    }
    #question-sub { font-size: 1.1rem; margin-bottom: 15px; }
    #question-img { width: 60%; max-width: 250px; margin-bottom: 20px; border-radius: 10px; }
    .btn-container { display: flex; justify-content: space-around; width: 100%; max-width: 400px; margin-top: 10px; }
    .option-btn {
        padding: 15px 25px;
        border: none;
        border-radius: 10px;
        font-size: 1.2rem;
        color: white;
        cursor: pointer;
        transition: transform 0.2s;
        box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    }
    .open-btn { background: linear-gradient(90deg, #4caf50, #81c784); }
    .close-btn { background: linear-gradient(90deg, #9c27b0, #ba68c8); }
    .option-btn.wrong { animation: shake 0.3s; }
    @keyframes shake { 0%{transform:translateX(0);} 25%{transform:translateX(-8px);}50%{transform:translateX(8px);}75%{transform:translateX(-8px);}100%{transform:translateX(0);} }
    #tick { font-size: 3rem; color: #00e676; margin-top: 10px; display: none; text-shadow: 1px 1px 4px #000; }
    #play-again {
        margin-top: 20px;
        padding: 15px 25px;
        font-size: 1.2rem;
        border: none;
        border-radius: 10px;
        background-color: #2196f3;
        color: white;
        cursor: pointer;
        box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    }
    #confetti-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="game-container">
    <div id="logo-screen">
        <img src="assets/innovine-logo.png" alt="Innovine Logo">
    </div>

    <div id="question-screen">
        <div id="header">Open & Close</div>
        <div id="sub-header">Let's Learn!</div>
        <div id="question-sub">Is it <span style="color: #4caf50;">Open</span> or <span style="color: #9c27b0;">Close</span>?</div>
        <img id="question-img" src="" alt="Question">
        <div class="btn-container">
            <button class="option-btn open-btn" id="open-btn">Open</button>
            <button class="option-btn close-btn" id="close-btn">Close</button>
        </div>
        <div id="tick">✔️ Good Job!</div>
    </div>

    <div id="end-screen">
        <div id="header">🎉 Congratulations! 🎉</div>
        <button id="play-again">Play Again</button>
    </div>
</div>
<canvas id="confetti-canvas"></canvas>

<script>
const questions = [
    { img: 'assets/box.png', answer: 'Open' },
    { img: 'assets/door.png', answer: 'Open' },
    { img: 'assets/jar.png', answer: 'Close' },
    { img: 'assets/book.png', answer: 'Open' },
    { img: 'assets/window.png', answer: 'Close' }
];

let currentQ = 0;
let wrongAttempts = 0;

const logoScreen = document.getElementById('logo-screen');
const questionScreen = document.getElementById('question-screen');
const endScreen = document.getElementById('end-screen');
const questionImg = document.getElementById('question-img');
const tick = document.getElementById('tick');
const openBtn = document.getElementById('open-btn');
const closeBtn = document.getElementById('close-btn');
const playAgain = document.getElementById('play-again');

const correctSound = new Audio('assets/correct.mp3');
const wrongSound = new Audio('assets/wrong.mp3');
const clapSound = new Audio('assets/freesound_community-claps-44774.mp3');

function showLogo() {
    logoScreen.style.display = 'flex';
    setTimeout(() => { 
        logoScreen.style.display = 'none'; 
        showQuestion();
    }, 2000);
}

function showQuestion() {
    if(currentQ >= questions.length) { showEndScreen(); return; }
    wrongAttempts = 0;
    tick.style.display = 'none';
    questionImg.src = questions[currentQ].img;
    questionScreen.style.display = 'flex';
}

function handleAnswer(ans) {
    if(ans === questions[currentQ].answer) {
        correctSound.play();
        tick.style.display = 'block';
        setTimeout(() => { currentQ++; showQuestion(); }, 1000);
    } else {
        wrongSound.play();
        wrongAttempts++;
        const btn = ans === 'Open' ? openBtn : closeBtn;
        btn.classList.add('wrong');
        setTimeout(() => btn.classList.remove('wrong'), 300);
        if(wrongAttempts >= 2) {
            const correctBtn = questions[currentQ].answer === 'Open' ? openBtn : closeBtn;
            correctBtn.style.boxShadow = '0 0 20px gold';
            setTimeout(() => correctBtn.style.boxShadow = '', 1000);
        }
    }
}

function showEndScreen() {
    questionScreen.style.display = 'none';
    endScreen.style.display = 'flex';
    launchConfetti();
    clapSound.play();
}

playAgain.addEventListener('click', () => { currentQ = 0; endScreen.style.display = 'none'; showQuestion(); });
openBtn.addEventListener('click', () => handleAnswer('Open'));
closeBtn.addEventListener('click', () => handleAnswer('Close'));

function launchConfetti() {
    const confettiCanvas = document.getElementById('confetti-canvas');
    const ctx = confettiCanvas.getContext('2d');
    confettiCanvas.width = window.innerWidth;
    confettiCanvas.height = window.innerHeight;
    let pieces = [];
    for(let i=0;i<150;i++){ pieces.push({x: Math.random()*confettiCanvas.width, y: Math.random()*confettiCanvas.height, r: Math.random()*6+4, d: Math.random()*Math.PI*2, color: `hsl(${Math.random()*360},100%,50%)`}); }
    function draw(){ ctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height); pieces.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=p.color; ctx.fill(); p.y+=3; p.x+=Math.sin(p.d); if(p.y>confettiCanvas.height)p.y=-10; }); requestAnimationFrame(draw); }
    draw();
}

showLogo();
</script>
</body>
</html>
